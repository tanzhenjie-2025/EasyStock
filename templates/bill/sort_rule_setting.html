{% extends "base.html" %}
{% block title %}排序规则设置 - EasyStock{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>开单排序规则设置（多阶段）</h3>
        
        <a href="/bill/" class="btn btn-outline-secondary">← 返回开单页</a>
    </div>

    <div class="alert alert-info">
        <strong>排序说明：</strong>多个阶段按顺序执行，阶段1为最外层，阶段2在阶段1分组内排序，以此类推。<br>
        同一阶段内的规则按优先级数字从小到大排列。未匹配任何规则的商品会排在当前阶段末尾。
    </div>

    <div id="stageContainer">
        <!-- 动态生成阶段卡片 -->
    </div>

    <div class="mt-3">
    <button type="button" class="btn btn-success" onclick="addStage()">+ 新增阶段</button>
    <button type="button" class="btn btn-primary ms-2" onclick="saveRules()">保存规则</button>
    <!-- 🔥 新增导入导出按钮 -->
    <button type="button" class="btn btn-outline-info ms-2" onclick="exportRules()">
        <i class="bi bi-download"></i> 导出规则
    </button>
    <button type="button" class="btn btn-outline-warning ms-2" id="importRuleBtn">
        <i class="bi bi-upload"></i> 导入规则
    </button>
    <input type="file" id="importRuleFile" accept=".xlsx" style="display: none;" />
</div>
</div>

<script>
    let stages = [];     // [{stage:1, rules:[]}, ...]
    let tags = [];

    try {
        stages = JSON.parse('{{ stages_json|safe }}');
        tags = JSON.parse('{{ tags_json|safe }}');
    } catch (e) {
        console.error('数据解析失败', e);
    }
    
    // 导出规则
function exportRules() {
    // 直接跳转到导出 URL（或使用 window.open）
    window.location.href = '/bill/sort-rules/export/';
}

// 导入规则 - 触发文件选择
document.getElementById('importRuleBtn').addEventListener('click', function() {
    document.getElementById('importRuleFile').click();
});

// 监听文件选择
document.getElementById('importRuleFile').addEventListener('change', function(e) {
    var file = this.files[0];
    if (!file) return;

    // 确认是否覆盖现有规则
    if (!confirm('导入将覆盖当前所有排序规则，确认继续？')) {
        this.value = '';  // 清空选择
        return;
    }

    var formData = new FormData();
    formData.append('file', file);

    fetch('/bill/sort-rules/import/', {
        method: 'POST',
        headers: {
            'X-CSRFToken': getCsrfToken()
        },
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.code === 1) {
            alert(data.msg);
            window.location.reload();  // 刷新页面显示新规则
        } else {
            alert('导入失败：' + (data.msg || '未知错误'));
            if (data.errors) {
                console.warn('详细错误：', data.errors);
            }
        }
    })
    .catch(err => {
        alert('请求异常：' + err.message);
    })
    .finally(() => {
        // 清空 input，允许重复选择同一文件
        document.getElementById('importRuleFile').value = '';
    });
});

// 确保 getCsrfToken 已定义（您已有该函数）

    // 渲染所有阶段
    function renderAllStages() {
        let html = '';
        stages.forEach((stage, stageIdx) => {
            let rules = stage.rules || [];
            html += `
            <div class="card mb-3">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <strong>阶段 ${stage.stage}</strong>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteStage(${stageIdx})">删除阶段</button>
                </div>
                <div class="card-body">
                    <table class="table table-bordered table-sm">
                        <thead>
                            <tr>
                                <th style="width:50px;">优先级</th>
                                <th>规则类型</th>
                                <th>具体内容</th>
                                <th style="width:80px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="stage-${stageIdx}-tbody">
                            ${renderRulesRows(stageIdx, rules)}
                        </tbody>
                    </table>
                    <button class="btn btn-sm btn-outline-secondary" onclick="addRule(${stageIdx})">+ 添加规则</button>
                </div>
            </div>`;
        });
        document.getElementById('stageContainer').innerHTML = html;
    }

    function renderRulesRows(stageIdx, rules) {
        if (!rules.length) {
            return `<tr><td colspan="4" class="text-muted">暂无规则，请添加</td></tr>`;
        }
        // 按优先级排序
        rules.sort((a, b) => (a.priority || 0) - (b.priority || 0));
        let rows = '';
        rules.forEach((rule, ruleIdx) => {
            let contentHtml = '';
            if (rule.type === 'tag') {
                if (tags.length === 0) {
                    contentHtml = '<span class="text-danger">⚠️ 无标签可用</span>';
                } else {
                    let options = tags.map(tag =>
                        `<option value="${tag.id}" ${rule.tag_id == tag.id ? 'selected' : ''}>${tag.name}</option>`
                    ).join('');
                    contentHtml = `<select class="form-select form-select-sm tag-select" onchange="updateRuleTag(${stageIdx}, ${ruleIdx}, this.value)">${options}</select>`;
                }
            } else {
                contentHtml = `<select class="form-select form-select-sm spec-select" onchange="updateRuleSpec(${stageIdx}, ${ruleIdx}, this.value)">
                    <option value="has_spec" ${rule.spec_condition === 'has_spec' ? 'selected' : ''}>有规格（整件）</option>
                    <option value="no_spec" ${rule.spec_condition === 'no_spec' ? 'selected' : ''}>无规格（散件）</option>
                </select>`;
            }
            rows += `
            <tr>
                <td><input type="number" class="form-control form-control-sm priority-input" value="${rule.priority || 0}" min="0" onchange="updateRulePriority(${stageIdx}, ${ruleIdx}, this.value)"></td>
                <td>
                    <select class="form-select form-select-sm" onchange="changeRuleType(${stageIdx}, ${ruleIdx}, this.value)">
                        <option value="tag" ${rule.type === 'tag' ? 'selected' : ''}>商品标签</option>
                        <option value="spec" ${rule.type === 'spec' ? 'selected' : ''}>商品规格</option>
                    </select>
                </td>
                <td>${contentHtml}</td>
                <td><button class="btn btn-sm btn-danger" onclick="deleteRule(${stageIdx}, ${ruleIdx})">删除</button></td>
            </tr>`;
        });
        return rows;
    }

    // 添加阶段
    function addStage() {
        let maxStage = stages.reduce((max, s) => Math.max(max, s.stage), 0);
        stages.push({ stage: maxStage + 1, rules: [] });
        renderAllStages();
    }

    // 删除阶段
    function deleteStage(stageIdx) {
        if (!confirm('确定删除这个阶段及其所有规则吗？')) return;
        stages.splice(stageIdx, 1);
        // 重新编号阶段
        stages.forEach((s, i) => s.stage = i + 1);
        renderAllStages();
    }

    // 添加规则
    function addRule(stageIdx) {
        let newRule = {
            type: 'tag',
            priority: (stages[stageIdx].rules.length || 0) + 1,
            tag_id: tags.length > 0 ? tags[0].id : null,
            spec_condition: null
        };
        if (newRule.type === 'tag' && !newRule.tag_id) {
            newRule.type = 'spec';
            newRule.spec_condition = 'has_spec';
        }
        stages[stageIdx].rules.push(newRule);
        renderAllStages();
    }

    // 删除规则
    function deleteRule(stageIdx, ruleIdx) {
        stages[stageIdx].rules.splice(ruleIdx, 1);
        renderAllStages();
    }

    // 修改规则类型
    function changeRuleType(stageIdx, ruleIdx, newType) {
        let rule = stages[stageIdx].rules[ruleIdx];
        rule.type = newType;
        if (newType === 'tag') {
            rule.tag_id = tags.length > 0 ? tags[0].id : null;
            rule.spec_condition = null;
        } else {
            rule.spec_condition = 'has_spec';
            rule.tag_id = null;
        }
        renderAllStages();
    }

    function updateRulePriority(stageIdx, ruleIdx, value) {
        stages[stageIdx].rules[ruleIdx].priority = parseInt(value) || 0;
    }

    function updateRuleTag(stageIdx, ruleIdx, tagId) {
        stages[stageIdx].rules[ruleIdx].tag_id = parseInt(tagId);
    }

    function updateRuleSpec(stageIdx, ruleIdx, value) {
        stages[stageIdx].rules[ruleIdx].spec_condition = value;
    }

    function getCsrfToken() {
        const name = 'csrftoken';
        const cookies = document.cookie.split(';');
        for (let c of cookies) {
            c = c.trim();
            if (c.startsWith(name + '=')) return decodeURIComponent(c.substring(name.length + 1));
        }
        return '';
    }

    async function saveRules() {
        // 同步所有输入框
        document.querySelectorAll('.priority-input').forEach(inp => {
            // 用data属性定位，但简单起见我们不需要，因为每次render后重新绑定，此处直接遍历表单获取也可行
            // 但为保险，我们已经通过onchange更新了stages变量，所以直接保存即可
        });

        let payload = { stages };
        try {
            const res = await fetch('/bill/sort-rules/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCsrfToken()
                },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (data.code === 1) {
                alert('保存成功！');
                window.location.reload();
            } else {
                alert('保存失败：' + data.msg);
            }
        } catch (e) {
            alert('请求异常');
        }
    }

    // 初始渲染
    renderAllStages();
</script>
{% endblock %}
