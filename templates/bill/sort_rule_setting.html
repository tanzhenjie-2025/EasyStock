{% extends "base.html" %}
{% block title %}排序规则设置 - EasyStock{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>开单排序规则设置</h3>
        <a href="/bill/" class="btn btn-outline-secondary">← 返回开单页</a>
    </div>

    <div class="alert alert-info">
        规则按优先级排序（数字越小越靠前），执行排序时商品从上到下匹配第一个符合条件的规则。
    </div>

    <form id="sortRuleForm">
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th style="width:50px;">优先级</th>
                    <th>规则类型</th>
                    <th>具体内容</th>
                    <th style="width:80px;">操作</th>
                </tr>
            </thead>
            <tbody id="ruleTbody">
                <!-- 动态生成 -->
            </tbody>
        </table>
        <div class="mt-3">
            <button type="button" class="btn btn-success" onclick="addRule()">+ 新增规则</button>
            <button type="button" class="btn btn-primary ms-2" onclick="saveRules()">保存</button>
        </div>
    </form>
</div>

<script>
    // 安全解析 JSON，避免页面因数据格式错误完全不可用
    let rules = [];
    let tags = [];
    try {
        rules = JSON.parse('{{ rules_json|safe }}');
        tags = JSON.parse('{{ tags_json|safe }}');
    } catch (e) {
        console.error('数据解析失败，请刷新页面', e);
        alert('数据解析错误，请刷新页面');
    }

    // 确保 rules 是数组
    if (!Array.isArray(rules)) rules = [];

    function renderRules() {
        let html = '';

        // 如果没有任何规则，自动添加一条默认的空白规则，让用户立刻看到界面
        if (rules.length === 0) {
            rules.push({
                type: 'tag',
                priority: 1,
                tag_id: tags.length > 0 ? tags[0].id : null,
                spec_condition: null
            });
        }

        // 按优先级排序
        rules.sort((a, b) => (a.priority || 0) - (b.priority || 0));

        rules.forEach((rule, index) => {
            // ① 确保优先级永远为数字
            let priority = rule.priority;
            if (priority === null || priority === undefined || isNaN(priority)) {
                priority = 0;
            }

            // ② 生成具体内容列
            let typeHtml = '';
            if (rule.type === 'tag') {
                if (tags.length === 0) {
                    typeHtml = '<span class="text-danger">⚠️ 暂无可用标签，请先添加商品标签</span>';
                } else {
                    let options = tags.map(tag =>
                        `<option value="${tag.id}" ${rule.tag_id == tag.id ? 'selected' : ''}>${tag.name}</option>`
                    ).join('');
                    typeHtml = `<select class="form-select tag-select" onchange="onRuleTypeChange(${index})">${options}</select>`;
                }
            } else { // 规格规则
                typeHtml = `<select class="form-select spec-select" onchange="onSpecChange(${index})">
                    <option value="has_spec" ${rule.spec_condition === 'has_spec' ? 'selected' : ''}>有规格（整件）</option>
                    <option value="no_spec" ${rule.spec_condition === 'no_spec' ? 'selected' : ''}>无规格（散件）</option>
                </select>`;
            }

            // ③ 构建整行，优先级输入框明确使用数字变量
            html += `
            <tr>
                <td><input type="number" class="form-control priority-input" value="${priority}" min="0" onchange="updatePriority(${index}, this.value)"></td>
                <td>
                    <select class="form-select" onchange="changeRuleType(${index}, this.value)">
                        <option value="tag" ${rule.type === 'tag' ? 'selected' : ''}>商品标签</option>
                        <option value="spec" ${rule.type === 'spec' ? 'selected' : ''}>商品规格</option>
                    </select>
                </td>
                <td>${typeHtml}</td>
                <td>
                    <button type="button" class="btn btn-sm btn-danger" onclick="deleteRule(${index})">删除</button>
                </td>
            </tr>`;
        });

        document.getElementById('ruleTbody').innerHTML = html;
    }

    // 以下函数保持不变（仅列出一部分），完整保留您原有的 addRule、deleteRule 等即可
    function addRule() {
        let newRule = {
            type: 'tag',
            priority: rules.length + 1,
            tag_id: tags.length > 0 ? tags[0].id : null,
            spec_condition: null
        };
        if (newRule.type === 'tag' && !newRule.tag_id) {
            newRule.type = 'spec';
            newRule.spec_condition = 'has_spec';
        }
        rules.push(newRule);
        renderRules();
    }

    function deleteRule(index) {
        rules.splice(index, 1);
        // 如果删空了，renderRules 会自动补一行默认规则，保证界面一直可见
        renderRules();
    }

    function changeRuleType(index, newType) {
        rules[index].type = newType;
        if (newType === 'tag') {
            rules[index].tag_id = tags.length > 0 ? tags[0].id : null;
            rules[index].spec_condition = null;
        } else {
            rules[index].spec_condition = 'has_spec';
            rules[index].tag_id = null;
        }
        renderRules();
    }

    function updatePriority(index, value) {
        rules[index].priority = parseInt(value) || 0;
    }

    function onRuleTypeChange(index) {
        const select = document.querySelectorAll('.tag-select')[index];
        if (select) rules[index].tag_id = parseInt(select.value);
    }

    function onSpecChange(index) {
        const select = document.querySelectorAll('.spec-select')[index];
        if (select) rules[index].spec_condition = select.value;
    }

    function getCsrfToken() {
        const name = 'csrftoken';
        const cookies = document.cookie.split(';');
        for (let c of cookies) {
            c = c.trim();
            if (c.startsWith(name + '=')) return decodeURIComponent(c.substring(name.length + 1));
        }
        return '';
    }

    async function saveRules() {
        // 同步所有优先级输入框的值
        document.querySelectorAll('.priority-input').forEach((inp, idx) => {
            rules[idx].priority = parseInt(inp.value) || 0;
        });

        try {
            const res = await fetch('/bill/sort-rules/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCsrfToken()
                },
                body: JSON.stringify({ rules })
            });
            const data = await res.json();
            if (data.code === 1) {
                alert('保存成功！');
                window.location.reload();
            } else {
                alert('保存失败：' + data.msg);
            }
        } catch (e) {
            alert('请求异常');
        }
    }

    // 初始化渲染
    renderRules();
</script>
{% endblock %}
