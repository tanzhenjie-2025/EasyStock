{% extends "base.html" %}

{% block title %}按区域组汇总商品销量 - EasyStock{% endblock %}

{% block extra_css %}
<style>
    .query-form {
        margin-bottom: 20px;
        display: flex;
        align-items: end;
        gap: 15px;
        flex-wrap: wrap;
    }
    .form-group {
        margin-bottom: 0 !important;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }
    .form-group label {
        font-size: 0.875rem;
        color: #6c757d;
        margin-bottom: 0;
    }
    .form-control-sm {
        height: calc(1.8125rem + 2px);
        padding: 0.25rem 0.5rem;
        font-size: 0.875rem;
    }
    .empty-data {
        text-align: center;
        padding: 20px;
        color: #666;
    }
    .field-checkbox {
        margin: 5px 0;
    }
    .select-all-btn {
        margin-bottom: 10px;
    }
    .custom-fields-section {
        border-top: 1px solid #eee;
        margin-top: 15px;
        padding-top: 15px;
    }
    .custom-field-item {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        padding: 8px;
        background: #f8f9fa;
        border-radius: 4px;
    }
    .custom-field-item input {
        flex: 1;
    }
    .custom-field-item select {
        width: 120px;
    }
    .btn-add-custom {
        margin-top: 10px;
        margin-bottom: 15px;
    }
    .btn-group-query {
        display: flex;
        gap: 8px;
    }
    .total-row {
        background-color: #4472C4;
        color: white;
        font-weight: bold;
        text-align: center;
    }
    #data tr:not(.total-row) {
        transition: all 0.2s ease;
        cursor: pointer;
    }
    #data tr:not(.total-row):hover td {
        background-color: #f1f1f1 !important;
    }
    .operate-col {
        width: 80px;
        text-align: center;
    }
    .btn-detail {
        padding: 2px 8px;
        font-size: 0.75rem;
    }
    /* 复选框样式微调，确保与按钮组对齐 */
    .auto-sort-label {
        font-size: 0.75rem;
        user-select: none;
        cursor: pointer;
        margin-bottom: 0;
        display: flex;
        align-items: center;
        gap: 4px;
    }
    .auto-sort-label input {
        margin-top: 0;
    }
</style>
{% endblock %}

{% block content %}
<h3>按区域组汇总订单（可精准到时分）</h3>

<div class="query-form">
    <div class="form-group">
        <label class="form-label-sm mb-0">区域组</label>
        <select id="group" class="form-select form-select-sm">
            <option value="">请选择区域组</option>
        </select>
    </div>
    <!-- 新增：开单人 -->
    <div class="form-group">
    <label class="form-label-sm mb-0">开单人</label>
    <select id="creator" class="form-select form-select-sm">
        <option value="">全部人</option>
    </select>
</div>

    <div class="form-group">
        <label class="form-label-sm mb-0">开始时间</label>
        <input type="datetime-local" id="s" class="form-control form-control-sm" placeholder="开始时间">
    </div>
    <div class="form-group">
        <label class="form-label-sm mb-0">结束时间</label>
        <input type="datetime-local" id="e" class="form-control form-control-sm" placeholder="结束时间">
    </div>
</div>

<div class="form-group" style="flex: 1; min-width: 200px;">
    <label class="form-label-sm mb-0">商品标签</label>
    <div id="tagContainer" style="display: flex; flex-wrap: wrap; gap: 8px;
         max-height: 100px; overflow-y: auto; border: 1px solid #ced4da;
         padding: 6px; border-radius: 4px; background: #fff;">
    </div>
    <div style="margin-top: 4px;">
        <a href="javascript:void(0)" onclick="selectAllTags(true)">全选</a> |
        <a href="javascript:void(0)" onclick="selectAllTags(false)">全不选</a>
    </div>
    <div class="form-group">
        <div class="btn-group-query">
            <button class="btn btn-sm btn-primary" onclick="query()">查询汇总</button>
            <button class="btn btn-sm btn-success" onclick="showExportModal()">导出Excel</button>
            <button class="btn btn-sm btn-outline-primary" onclick="sortProductSummary()" title="按规则排序">📋 点击排序</button>
            <!-- 新增：默认排序复选框 -->
            <label class="auto-sort-label ms-1">
                <input type="checkbox" id="autoSortCheckbox"> 默认排序
            </label>
        </div>
    </div>
</div>

<table class="table table-sm table-bordered">
    <thead>
        <tr>
            <th>序号</th>
            <th>商品</th>
            <th>单位</th>
            <th>单价</th>
            <th>总销量</th>
            <th>总金额</th>
            <th class="operate-col">操作</th>
        </tr>
    </thead>
    <tbody id="data"></tbody>
</table>

<div class="modal fade" id="exportModal" tabindex="-1" aria-labelledby="exportModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exportModalLabel">选择导出字段</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="select-all-btn">
                    <button type="button" class="btn btn-xs btn-outline-primary" onclick="selectAllFields(true)">全选</button>
                    <button type="button" class="btn btn-xs btn-outline-secondary ms-1" onclick="selectAllFields(false)">取消全选</button>
                </div>
                <div class="field-checkbox">
                    <input type="checkbox" id="field_serial" name="export_fields" value="serial" checked>
                    <label for="field_serial">序号</label>
                </div>
                <div class="field-checkbox">
                    <input type="checkbox" id="field_name" name="export_fields" value="name" checked>
                    <label for="field_name">商品名称</label>
                </div>
                <div class="field-checkbox">
                    <input type="checkbox" id="field_unit" name="export_fields" value="unit" checked>
                    <label for="field_unit">单位</label>
                </div>
                <div class="field-checkbox">
                    <input type="checkbox" id="field_price" name="export_fields" value="price" checked>
                    <label for="field_price">单价</label>
                </div>
                <div class="field-checkbox">
                    <input type="checkbox" id="field_total_qty" name="export_fields" value="total_qty" checked>
                    <label for="field_total_qty">数量</label>
                </div>
                <div class="field-checkbox">
                    <input type="checkbox" id="field_total_amt" name="export_fields" value="total_amt" checked>
                    <label for="field_total_amt">总金额</label>
                </div>
                <div class="field-checkbox">
                    <input type="checkbox" id="field_remark" name="export_fields" value="remark" checked>
                    <label for="field_remark">备注</label>
                </div>
                <div class="custom-fields-section">
                    <h6>自定义字段（用于手动填写）</h6>
                    <div id="customFieldsContainer"></div>
                    <button type="button" class="btn btn-sm btn-outline-success btn-add-custom" onclick="addCustomField()">
                        + 添加自定义字段
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="exportExcel()">确认导出</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let queryParams = {};
let customFieldCount = 0;
const STORAGE_KEY = 'product_summary_data';
let allTags = [];

// 排序相关变量
let sortStagesCache = [];
let isSortDataReady = false;
let pendingAutoSort = false;   // 标记是否需要等待排序规则就绪后自动排序

function loadUsers() {
    return $.get('/summary/user-list/', function(res) {
        if (res.code === 1) {
            const $creator = $('#creator');
            $creator.find('option:not(:first)').remove();
            res.data.forEach(user => {
                $creator.append(`<option value="${user.id}">${user.username}</option>`);
            });
        }
    }).fail(function() {
        console.warn('加载开单人列表失败');
    });
}

// ---------- 加载标签 ----------
function loadTags() {
    return $.get('/summary/tag-list/', function(res) {
        if (res.code === 1) {
            allTags = res.data;
            renderTags(res.data);
            restoreTagSelection();   // 恢复标签选中状态
        }
    }).fail(function() {
        console.warn('加载标签失败');
        $('#tagContainer').html('<span class="text-muted">暂无标签</span>');
    });
}

function renderTags(tags) {
    let html = '';
    tags.forEach(t => {
        html += `<label style="display: inline-flex; align-items: center; margin-right: 6px;">
            <input type="checkbox" class="tag-checkbox" value="${t.id}" checked style="margin-right: 4px;">
            <span style="color: ${t.color};">${t.name}</span>
        </label>`;
    });
    $('#tagContainer').html(html);
}

function selectAllTags(select) {
    $('.tag-checkbox').prop('checked', select);
}

function getSelectedTagIds() {
    let ids = [];
    $('.tag-checkbox:checked').each(function() {
        ids.push($(this).val());
    });
    return ids.join(',');
}

function restoreTagSelection() {
    const stored = sessionStorage.getItem(STORAGE_KEY);
    if (stored) {
        const { params } = JSON.parse(stored);
        if (params && params.tag_ids) {
            const selected = params.tag_ids.split(',').map(Number);
            $('.tag-checkbox').prop('checked', false);
            selected.forEach(id => {
                $(`.tag-checkbox[value="${id}"]`).prop('checked', true);
            });
        } else {
            $('.tag-checkbox').prop('checked', true);
        }
    } else {
        $('.tag-checkbox').prop('checked', true);
    }
}

function loadGroup() {
    return $.get('/summary/group/list/', function(res) {
        if (res.code === 1) {
            let opt = '';
            res.data.forEach(g => {
                let selected = (g.id == '0' || g.id === 0) ? ' selected' : '';
                opt += `<option value="${g.id}"${selected}>${g.name}</option>`;
            });
            $('#group').html(opt);
        } else {
            $('#group').html('<option value="0" selected>全部区域</option>');
        }
    }).fail(function() {
        $('#group').html('<option value="0" selected>全部区域</option>');
    });
}

// ---------- 恢复查询数据 ----------
function restoreSummaryData() {
    try {
        const storedData = sessionStorage.getItem(STORAGE_KEY);
        if (!storedData) return;

        const { params, result } = JSON.parse(storedData);
        if (!params || !result) return;

        $('#group').val(params.group_id);
        $('#s').val(params.start_date);
        $('#e').val(params.end_date);

        if (params.creator_id) {
            $('#creator').val(params.creator_id);
        } else {
            $('#creator').val('');   // 默认“全部人”
        }
        queryParams = params;

        if (result.code !== 1) {
            $('#data').html('');
            return;
        }
        if (result.data.length === 0) {
            $('#data').html('<tr><td colspan="7" class="empty-data">该时间段内无销售数据</td></tr>');
            return;
        }

        let html = '';
        result.data.forEach(i => {
            const detailUrl = `/summary/product-detail/${i.pid}/?group_id=${params.group_id}&start_date=${params.start_date}&end_date=${params.end_date}`;
            html += `<tr onclick="window.location.href='${detailUrl}'"
    data-tags='${JSON.stringify(i.tags)}'
    data-specification='${i.specification || ""}'>
    <td>${i.serial}</td>
    <td>${i.name}</td>
    <td>${i.unit}</td>
    <td>${i.price.toFixed(2)}</td>
    <td>${i.total_qty}</td>
    <td>${i.total_amt.toFixed(2)}</td>
                <td class="operate-col">
                    <button class="btn btn-sm btn-outline-primary btn-detail" onclick="event.stopPropagation(); window.location.href='${detailUrl}'">详情</button>
                </td>
            </tr>`;
        });
        html += `<tr class="total-row">
            <td colspan="5">总计</td>
            <td>${result.total_amount.toFixed(2)}</td>
            <td class="operate-col"></td>
        </tr>`;
        $('#data').html(html);

        // 根据默认排序设置自动排序（如果已勾选）
        handleAutoSort();

    } catch (e) {
        console.error('恢复汇总数据失败：', e);
        sessionStorage.removeItem(STORAGE_KEY);
    }
}

// ---------- 查询汇总 ----------
function query(){
    let group_id = $('#group').val();
    let start_time = $('#s').val();
    let end_time = $('#e').val();
    let creator_id = $('#creator').val();   // 新增

    if (!group_id) return alert('请先选择区域组');
    if (!start_time || !end_time) return alert('请选择完整的时间范围');

    const start = new Date(start_time);
    const end = new Date(end_time);
    if (isNaN(start.getTime()) || isNaN(end.getTime())) {
        return alert('时间格式错误，请选择有效的时间');
    }
    if (start > end) return alert('开始时间不能晚于结束时间');

    let selectedIds = getSelectedTagIds();
    let totalTags = allTags.length;
    let tagParam = (selectedIds.split(',').length === totalTags) ? '' : selectedIds;

    queryParams = {
        group_id: group_id,
        start_date: start_time,
        end_date: end_time,
        tag_ids: tagParam,
        creator_id: creator_id   // 新增，空字符串表示全部
    };

    $.get('/summary/by-group/', queryParams, function(res) {
        if (res.code !== 1) {
            alert(res.msg || '查询失败');
            $('#data').html('');
            sessionStorage.removeItem(STORAGE_KEY);
            return;
        }

        const saveData = { params: queryParams, result: res };
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify(saveData));

        if (res.data.length === 0) {
            $('#data').html('<tr><td colspan="7" class="empty-data">该时间段内无销售数据</td></tr>');
            return;
        }

        let html = '';
        res.data.forEach(i => {
            const detailUrl = `/summary/product-detail/${i.pid}/?group_id=${queryParams.group_id}&start_date=${queryParams.start_date}&end_date=${queryParams.end_date}`;
            html += `<tr onclick="window.location.href='${detailUrl}'"
    data-tags='${JSON.stringify(i.tags)}'
    data-specification='${i.specification || ""}'>
    <td>${i.serial}</td>
    <td>${i.name}</td>
    <td>${i.unit}</td>
    <td>${i.price.toFixed(2)}</td>
    <td>${i.total_qty}</td>
    <td>${i.total_amt.toFixed(2)}</td>
                <td class="operate-col">
                    <button class="btn btn-sm btn-outline-primary btn-detail" onclick="event.stopPropagation(); window.location.href='${detailUrl}'">详情</button>
                </td>
            </tr>`;
        });
        html += `<tr class="total-row">
            <td colspan="5">总计</td>
            <td>${res.total_amount.toFixed(2)}</td>
            <td class="operate-col"></td>
        </tr>`;
        $('#data').html(html);

        // 检查是否需要自动排序
        handleAutoSort();
    }).fail(function() {
        alert('查询失败，请检查网络或接口');
        sessionStorage.removeItem(STORAGE_KEY);
    });
}

// ---------- 导出相关 ----------
function showExportModal() {
    if (!queryParams.group_id) {
        return alert('请先执行查询操作');
    }
    customFieldCount = 0;
    $('#customFieldsContainer').empty();
    const modal = new bootstrap.Modal(document.getElementById('exportModal'));
    modal.show();
}

function selectAllFields(isSelect) {
    $('input[name="export_fields"]').prop('checked', isSelect);
}

function addCustomField() {
    customFieldCount++;
    let targetFieldsHtml = '';
    $('input[name="export_fields"]').each(function() {
        const fieldValue = $(this).val();
        const fieldLabel = $(this).next('label').text();
        targetFieldsHtml += `<option value="${fieldValue}">${fieldLabel}</option>`;
    });

    const customFieldHtml = `
    <div class="custom-field-item" data-index="${customFieldCount}">
        <input type="text" class="form-control form-control-sm custom-field-name" placeholder="字段名称" value="备注${customFieldCount}">
        <select class="form-select form-select-sm custom-field-position">
            <option value="after">在...之后</option>
            <option value="before">在...之前</option>
        </select>
        <select class="form-select form-select-sm custom-field-target">
            ${targetFieldsHtml}
        </select>
        <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeCustomField(${customFieldCount})">×</button>
    </div>`;
    $('#customFieldsContainer').append(customFieldHtml);
}

function removeCustomField(index) {
    $(`.custom-field-item[data-index="${index}"]`).remove();
}

function exportExcel() {
    let selectedFields = [];
    $('input[name="export_fields"]:checked').each(function() {
        selectedFields.push($(this).val());
    });
    if (selectedFields.length === 0) return alert('请至少选择一个导出字段');

    let customFields = [];
    $('.custom-field-item').each(function() {
        const name = $(this).find('.custom-field-name').val().trim();
        const position = $(this).find('.custom-field-position').val();
        const target = $(this).find('.custom-field-target').val();
        if (name) customFields.push({ name, position, target });
    });

    let sortedData = [];
    $('#data tr:not(.total-row)').each(function() {
        const cells = $(this).find('td');
        sortedData.push({
            serial: cells.eq(0).text(),
            name: cells.eq(1).text(),
            unit: cells.eq(2).text(),
            price: parseFloat(cells.eq(3).text()) || 0,
            total_qty: parseInt(cells.eq(4).text()) || 0,
            total_amt: parseFloat(cells.eq(5).text()) || 0,
            remark: ''
        });
    });

    let formData = new FormData();
    formData.append('group_id', queryParams.group_id);
    formData.append('start_date', queryParams.start_date);
    formData.append('end_date', queryParams.end_date);
    formData.append('custom_fields', JSON.stringify(customFields));
    formData.append('tag_ids', getSelectedTagIds());
    selectedFields.forEach(field => formData.append('fields[]', field));
    formData.append('sorted_data', JSON.stringify(sortedData));

    $.ajax({
        url: '/summary/export-product/',
        type: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        xhrFields: { responseType: 'blob' },
        success: function(res, status, xhr) {
            const contentType = xhr.getResponseHeader('Content-Type');
            if (contentType.includes('application/json')) {
                const reader = new FileReader();
                reader.onload = function() {
                    alert('导出失败：' + JSON.parse(this.result).msg);
                };
                reader.readAsText(res);
                return;
            }
            const modal = bootstrap.Modal.getInstance(document.getElementById('exportModal'));
            modal.hide();
            const url = window.URL.createObjectURL(res);
            const a = document.createElement('a');
            a.href = url;
            let groupName = $('#group option:selected').text() || '商品汇总';
            let today = new Date().toISOString().split('T')[0].replace(/-/g, '');
            a.download = `${today}商品汇总_${groupName}.xlsx`;
            a.click();
            window.URL.revokeObjectURL(url);
        },
        error: function(xhr) {
            let msg = '导出失败';
            if (xhr.responseJSON) msg = xhr.responseJSON.msg || msg;
            alert(msg);
        }
    });
}

// ---------- 排序相关 ----------
async function loadSortRules() {
    try {
        const res = await fetch('/bill/get-sort-rules/');
        const data = await res.json();
        if (data.code === 1) {
            sortStagesCache = data.data;
        }
    } catch (e) {
        console.error('获取排序规则失败:', e);
    }
}

async function initSortData() {
    await loadSortRules();
    isSortDataReady = true;
    // 若之前因规则未就绪而搁置了自动排序，现在执行
    if (pendingAutoSort && $('#autoSortCheckbox').is(':checked')) {
        sortProductSummary();
        pendingAutoSort = false;
    }
}

function getStageOrderValue(tr, stageRules) {
    const tagsStr = tr.getAttribute('data-tags');
    let tagIds = [];
    if (tagsStr) {
        try { tagIds = JSON.parse(tagsStr); } catch(e) {}
    }
    const specification = tr.getAttribute('data-specification') || '';
    const hasSpec = specification.trim() !== '';

    for (let rule of stageRules) {
        if (rule.type === 'tag') {
            if (tagIds.includes(rule.tag_id)) {
                return rule.priority;
            }
        } else if (rule.type === 'spec') {
            if (rule.spec_condition === 'has_spec' && hasSpec) {
                return rule.priority;
            }
            if (rule.spec_condition === 'no_spec' && !hasSpec) {
                return rule.priority;
            }
        }
    }
    return 9999;
}

function sortProductSummary() {
    if (!isSortDataReady) {
        alert('排序数据正在加载，请稍后再试。');
        return;
    }
    if (!sortStagesCache || sortStagesCache.length === 0) {
        alert('暂无排序规则，请先设置排序规则。');
        return;
    }

    const rows = $('#data tr:not(.total-row)').get();
    const rowsWithKeys = rows.map(row => {
        const sortKey = [];
        for (let stage of sortStagesCache) {
            sortKey.push(getStageOrderValue(row, stage.rules || []));
        }
        return { row, sortKey };
    });

    rowsWithKeys.sort((a, b) => {
        for (let i = 0; i < Math.max(a.sortKey.length, b.sortKey.length); i++) {
            let va = a.sortKey[i] !== undefined ? a.sortKey[i] : 9999;
            let vb = b.sortKey[i] !== undefined ? b.sortKey[i] : 9999;
            if (va !== vb) return va - vb;
        }
        return 0;
    });

    const tbody = document.getElementById('data');
    const totalRow = $('#data tr.total-row').detach();
    rowsWithKeys.forEach(({row}) => tbody.appendChild(row));
    if (totalRow.length) tbody.appendChild(totalRow[0]);

    $('#data tr:not(.total-row)').each((index, row) => {
        $(row).find('td:first').text(index + 1);
    });
}

// ---------- 默认排序复选框逻辑 ----------
const AUTO_SORT_KEY = 'default_auto_sort';
const $autoSortCheckbox = $('#autoSortCheckbox');

// 保存状态到 localStorage
function saveAutoSortState() {
    localStorage.setItem(AUTO_SORT_KEY, $autoSortCheckbox.is(':checked'));
}

// 恢复状态
function restoreAutoSortState() {
    const saved = localStorage.getItem(AUTO_SORT_KEY);
    if (saved === 'true') {
        $autoSortCheckbox.prop('checked', true);
    } else {
        $autoSortCheckbox.prop('checked', false);
    }
}

// 监听变化
$autoSortCheckbox.on('change', saveAutoSortState);

// 处理自动排序：如果勾选了“默认排序”，则在数据渲染后自动排序
function handleAutoSort() {
    if ($autoSortCheckbox.is(':checked')) {
        if (isSortDataReady) {
            sortProductSummary();
            pendingAutoSort = false;
        } else {
            // 标记等待，等 initSortData 完成后再排
            pendingAutoSort = true;
        }
    } else {
        pendingAutoSort = false;
    }
}

// ---------- 页面初始化 ----------
$(function(){
    restoreAutoSortState();   // 恢复复选框状态

    // 设置默认时间（可保留原逻辑）
    const now = new Date();
    const pad = (num) => num.toString().padStart(2, '0');
    const defaultTime = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
    $('#s').val(defaultTime);
    $('#e').val(defaultTime);

    // 并行加载三个下拉数据，全部完成后执行后续
    $.when(loadGroup(), loadUsers(), loadTags()).done(function() {
        restoreSummaryData();   // 恢复之前保存的查询参数和结果
        initSortData();        // 初始化排序规则（自动加载）
    });
});
</script>
