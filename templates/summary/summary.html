{% extends "base.html" %}

{% block title %}按区域组汇总商品销量 - EasyStock{% endblock %}

{% block extra_css %}
<style>
    .query-form { 
        margin-bottom: 20px; 
        display: flex;
        align-items: end;
        gap: 15px;
        flex-wrap: wrap;
    }
    .form-group {
        margin-bottom: 0 !important;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }
    .form-group label {
        font-size: 0.875rem;
        color: #6c757d;
        margin-bottom: 0;
    }
    .form-control-sm {
        height: calc(1.8125rem + 2px);
        padding: 0.25rem 0.5rem;
        font-size: 0.875rem;
    }
    .empty-data { 
        text-align: center; 
        padding: 20px; 
        color: #666; 
    }
    .field-checkbox { 
        margin: 5px 0; 
    }
    .select-all-btn { 
        margin-bottom: 10px; 
    }
    .custom-fields-section {
        border-top: 1px solid #eee;
        margin-top: 15px;
        padding-top: 15px;
    }
    .custom-field-item {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        padding: 8px;
        background: #f8f9fa;
        border-radius: 4px;
    }
    .custom-field-item input {
        flex: 1;
    }
    .custom-field-item select {
        width: 120px;
    }
    .btn-add-custom {
        margin-top: 10px;
        margin-bottom: 15px;
    }
    /* 按钮组样式，保证两个按钮垂直对齐 */
    .btn-group-query {
        display: flex;
        gap: 8px;
    }
    /* 总计行样式 */
    .total-row {
        background-color: #4472C4;
        color: white;
        font-weight: bold;
        text-align: center;
    }
    
    /* 核心优化：行高亮样式 - 整行浅灰色，总计行不生效 */
    #data tr:not(.total-row) {
        transition: all 0.2s ease;
        cursor: pointer;
    }
    #data tr:not(.total-row):hover td {
        background-color: #f1f1f1 !important; /* 统一浅灰色高亮 */
    }
    /* 操作栏样式：固定宽度，居中对齐 */
    .operate-col {
        width: 80px;
        text-align: center;
    }
    /* 详情按钮样式优化 */
    .btn-detail {
        padding: 2px 8px;
        font-size: 0.75rem;
    }
</style>
{% endblock %}

{% block content %}
<h3>按区域组汇总订单（可精准到时分）</h3>

<!-- 查询表单 -->
<div class="query-form">
    <div class="form-group">
        <label class="form-label-sm mb-0">区域组</label>
        <select id="group" class="form-select form-select-sm">
            <option value="">请选择区域组</option>
        </select>
    </div>
    <div class="form-group">
        <label class="form-label-sm mb-0">开始时间</label>
        <input type="datetime-local" id="s" class="form-control form-control-sm" placeholder="开始时间">
    </div>
    <div class="form-group">
        <label class="form-label-sm mb-0">结束时间</label>
        <input type="datetime-local" id="e" class="form-control form-control-sm" placeholder="结束时间">
    </div>
    <div class="form-group">
        <!-- 修改：添加按钮组样式，保证两个按钮垂直对齐 -->
        <div class="btn-group-query">
            <button class="btn btn-sm btn-primary" onclick="query()">查询汇总</button>
            <button class="btn btn-sm btn-success" onclick="showExportModal()">导出Excel</button>
        </div>
    </div>
</div>

<!-- 数据表格：新增操作列 -->
<table class="table table-sm table-bordered">
    <thead>
        <tr>
            <th>序号</th>
            <th>商品</th>
            <th>单位</th>
            <th>单价</th>
            <th>总销量</th>
            <th>总金额</th>
            <th class="operate-col">操作</th> <!-- 新增：独立操作栏 -->
        </tr>
    </thead>
    <tbody id="data"></tbody>
</table>

<!-- 导出字段选择模态框 -->
<div class="modal fade" id="exportModal" tabindex="-1" aria-labelledby="exportModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exportModalLabel">选择导出字段</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <!-- 全选/取消全选按钮 -->
                <div class="select-all-btn">
                    <button type="button" class="btn btn-xs btn-outline-primary" onclick="selectAllFields(true)">全选</button>
                    <button type="button" class="btn btn-xs btn-outline-secondary ms-1" onclick="selectAllFields(false)">取消全选</button>
                </div>
                
                <!-- 商品汇总字段选项 -->
                <div class="field-checkbox">
                    <input type="checkbox" id="field_serial" name="export_fields" value="serial" checked>
                    <label for="field_serial">序号</label>
                </div>
                <div class="field-checkbox">
                    <input type="checkbox" id="field_name" name="export_fields" value="name" checked>
                    <label for="field_name">商品名称</label>
                </div>
                <div class="field-checkbox">
                    <input type="checkbox" id="field_unit" name="export_fields" value="unit" checked>
                    <label for="field_unit">单位</label>
                </div>
                <div class="field-checkbox">
                    <input type="checkbox" id="field_price" name="export_fields" value="price" checked>
                    <label for="field_price">单价</label>
                </div>
                <div class="field-checkbox">
                    <input type="checkbox" id="field_total_qty" name="export_fields" value="total_qty" checked>
                    <label for="field_total_qty">数量</label>
                </div>
                <div class="field-checkbox">
                    <input type="checkbox" id="field_total_amt" name="export_fields" value="total_amt" checked>
                    <label for="field_total_amt">总金额</label>
                </div>
                <div class="field-checkbox">
                    <input type="checkbox" id="field_remark" name="export_fields" value="remark" checked>
                    <label for="field_remark">备注</label>
                </div>
                
                <!-- 自定义字段区域 -->
                <div class="custom-fields-section">
                    <h6>自定义字段（用于手动填写）</h6>
                    <div id="customFieldsContainer">
                        <!-- 自定义字段项将动态添加到这里 -->
                    </div>
                    <button type="button" class="btn btn-sm btn-outline-success btn-add-custom" onclick="addCustomField()">
                        + 添加自定义字段
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="exportExcel()">确认导出</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// 全局变量
let queryParams = {};
let customFieldCount = 0;
// 定义存储键名（统一管理）
const STORAGE_KEY = 'product_summary_data';

// 1. 加载区域组列表（原有逻辑不变，仅补充注释）
function loadGroup(){
    $.ajax({
        url: '/summary/group/list/',
        type: 'GET',
        dataType: 'json',
        success: function(res) {
            console.log('区域组接口响应：', res);
            
            // 处理错误响应
            if (res && res.code === 0) {
                alert('加载区域组失败：' + res.msg);
                return;
            }
            
            // 确保是数组
            let groupData = Array.isArray(res) ? res : [];
            
            // 渲染下拉框（至少包含全部区域）
            let opt = '<option value="">请选择区域组</option>';
            if (groupData.length === 0) {
                opt += '<option value="0">全部区域</option>';
            } else {
                groupData.forEach(g => {
                    opt += `<option value="${g.id}">${g.name}</option>`;
                });
            }
            $('#group').html(opt);
            
            // 初始化完成后，恢复之前的查询状态
            restoreSummaryData();
        },
        error: function(xhr, status, error) {
            console.error('区域组加载失败：', xhr, status, error);
            alert(`加载区域组失败：${status}（状态码：${xhr.status}）`);
            // 兜底显示全部区域
            let opt = '<option value="">请选择区域组</option>';
            opt += '<option value="0">全部区域</option>';
            $('#group').html(opt);
            
            // 即使加载失败，也尝试恢复查询状态
            restoreSummaryData();
        }
    });
}

// 新增：恢复汇总数据（核心函数）
function restoreSummaryData() {
    try {
        // 从会话存储中读取数据
        const storedData = sessionStorage.getItem(STORAGE_KEY);
        if (!storedData) return;
        
        const { params, result } = JSON.parse(storedData);
        if (!params || !result) return;
        
        // 1. 恢复表单参数
        $('#group').val(params.group_id);
        $('#s').val(params.start_date);
        $('#e').val(params.end_date);
        
        // 2. 恢复全局查询参数
        queryParams = params;
        
        // 3. 渲染汇总结果（适配新增的操作列）
        if (result.code !== 1) {
            $('#data').html('');
            return;
        }
        if (result.data.length === 0) {
            // 调整colspan为7（新增操作列）
            $('#data').html('<tr><td colspan="7" class="empty-data">该时间段内无销售数据</td></tr>');
            return;
        }
        
        let html = '';
        result.data.forEach(i => {
            const detailUrl = `/summary/product-detail/${i.pid}/?group_id=${params.group_id}&start_date=${params.start_date}&end_date=${params.end_date}`;
            html += `<tr onclick="window.location.href='${detailUrl}'">
                <td>${i.serial}</td>
                <td>${i.name}</td>
                <td>${i.unit}</td>
                <td>${i.price.toFixed(2)}</td>
                <td>${i.total_qty}</td>
                <td>${i.total_amt.toFixed(2)}</td>
                <td class="operate-col"> <!-- 操作栏：详情按钮移到这里 -->
                    <button class="btn btn-sm btn-outline-primary btn-detail" onclick="event.stopPropagation(); window.location.href='${detailUrl}'">详情</button>
                </td>
            </tr>`;
        });
        // 添加总计行（调整colspan为6，操作列空）
        html += `<tr class="total-row">
            <td colspan="6">总计</td>
            <td class="operate-col"></td>
        </tr>`;
        $('#data').html(html);
        
    } catch (e) {
        console.error('恢复汇总数据失败：', e);
        // 出错时清空存储，避免脏数据
        sessionStorage.removeItem(STORAGE_KEY);
    }
}

// 2. 查询汇总（修改：适配新增的操作列）
function query(){
    let group_id = $('#group').val();
    let start_time = $('#s').val();
    let end_time = $('#e').val();

    if (!group_id) return alert('请先选择区域组');
    if (!start_time || !end_time) return alert('请选择完整的时间范围');
    
    const start = new Date(start_time);
    const end = new Date(end_time);
    if (isNaN(start.getTime()) || isNaN(end.getTime())) {
        return alert('时间格式错误，请选择有效的时间');
    }
    if (start > end) return alert('开始时间不能晚于结束时间');

    // 保存查询参数
    queryParams = {
        group_id: group_id,
        start_date: start_time,
        end_date: end_time
    };

    // 发起查询
    $.get('/summary/by-group/', queryParams, function(res) {
        if (res.code !== 1) {
            alert(res.msg || '查询失败');
            $('#data').html('');
            // 保存失败状态（清空存储）
            sessionStorage.removeItem(STORAGE_KEY);
            return;
        }
        
        // 成功查询后，保存参数和结果到会话存储
        const saveData = {
            params: queryParams,
            result: res
        };
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify(saveData));
        
        if (res.data.length === 0) {
            // 调整colspan为7（新增操作列）
            $('#data').html('<tr><td colspan="7" class="empty-data">该时间段内无销售数据</td></tr>');
            return;
        }
        // 渲染数据（详情按钮移到操作列）
        let html = '';
        res.data.forEach(i => {
            const detailUrl = `/summary/product-detail/${i.pid}/?group_id=${queryParams.group_id}&start_date=${queryParams.start_date}&end_date=${queryParams.end_date}`;
            html += `<tr onclick="window.location.href='${detailUrl}'">
                <td>${i.serial}</td>
                <td>${i.name}</td>
                <td>${i.unit}</td>
                <td>${i.price.toFixed(2)}</td>
                <td>${i.total_qty}</td>
                <td>${i.total_amt.toFixed(2)}</td>
                <td class="operate-col"> <!-- 独立操作栏 -->
                    <button class="btn btn-sm btn-outline-primary btn-detail" onclick="event.stopPropagation(); window.location.href='${detailUrl}'">详情</button>
                </td>
            </tr>`;
        });
        // 添加总计行（调整colspan为6）
        html += `<tr class="total-row">
            <td colspan="6">总计</td>
            <td class="operate-col"></td>
        </tr>`;
        $('#data').html(html);
    }).fail(function() {
        alert('查询失败，请检查网络或接口');
        sessionStorage.removeItem(STORAGE_KEY);
    });
}

// 3. 显示导出模态框（原有逻辑不变）
function showExportModal() {
    if (!queryParams.group_id) {
        return alert('请先执行查询操作');
    }
    // 重置自定义字段
    customFieldCount = 0;
    $('#customFieldsContainer').empty();
    const modal = new bootstrap.Modal(document.getElementById('exportModal'));
    modal.show();
}

// 4. 全选/取消全选字段（原有逻辑不变）
function selectAllFields(isSelect) {
    $('input[name="export_fields"]').prop('checked', isSelect);
}

// 5. 添加自定义字段（原有逻辑不变）
function addCustomField() {
    customFieldCount++;
    
    // 获取所有可选的目标字段
    let targetFieldsHtml = '';
    $('input[name="export_fields"]').each(function() {
        const fieldValue = $(this).val();
        const fieldLabel = $(this).next('label').text();
        targetFieldsHtml += `<option value="${fieldValue}">${fieldLabel}</option>`;
    });
    
    const customFieldHtml = `
    <div class="custom-field-item" data-index="${customFieldCount}">
        <input type="text" class="form-control form-control-sm custom-field-name" placeholder="字段名称（如：上次金额）" value="备注${customFieldCount}">
        <select class="form-select form-select-sm custom-field-position">
            <option value="after">在...之后</option>
            <option value="before">在...之前</option>
        </select>
        <select class="form-select form-select-sm custom-field-target">
            ${targetFieldsHtml}
        </select>
        <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeCustomField(${customFieldCount})">×</button>
    </div>
    `;
    
    $('#customFieldsContainer').append(customFieldHtml);
}

// 6. 移除自定义字段（原有逻辑不变）
function removeCustomField(index) {
    $(`.custom-field-item[data-index="${index}"]`).remove();
}

// 7. 导出Excel（原有逻辑不变）
function exportExcel() {
    // 获取选中的字段
    let selectedFields = [];
    $('input[name="export_fields"]:checked').each(function() {
        selectedFields.push($(this).val());
    });

    if (selectedFields.length === 0) {
        return alert('请至少选择一个导出字段');
    }

    // 获取自定义字段配置
    let customFields = [];
    $('.custom-field-item').each(function() {
        const name = $(this).find('.custom-field-name').val().trim();
        const position = $(this).find('.custom-field-position').val();
        const target = $(this).find('.custom-field-target').val();
        
        if (name) {
            customFields.push({
                name: name,
                position: position,
                target: target
            });
        }
    });

    // 构建表单数据
    let formData = new FormData();
    formData.append('group_id', queryParams.group_id);
    formData.append('start_date', queryParams.start_date);
    formData.append('end_date', queryParams.end_date);
    formData.append('custom_fields', JSON.stringify(customFields));
    
    selectedFields.forEach(field => {
        formData.append('fields[]', field);
    });

    // 发起导出请求
    $.ajax({
        url: '/summary/export-product/',
        type: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        xhrFields: {
            responseType: 'blob'
        },
        success: function(res, status, xhr) {
            // 检查是否是错误响应
            const contentType = xhr.getResponseHeader('Content-Type');
            if (contentType.includes('application/json')) {
                // 解析错误信息
                const reader = new FileReader();
                reader.onload = function() {
                    const error = JSON.parse(this.result);
                    alert('导出失败：' + error.msg);
                };
                reader.readAsText(res);
                return;
            }

            // 关闭模态框
            const modal = bootstrap.Modal.getInstance(document.getElementById('exportModal'));
            modal.hide();

            // 生成下载链接
            const url = window.URL.createObjectURL(res);
            const a = document.createElement('a');
            a.href = url;
            let groupName = $('#group option:selected').text() || '商品汇总';
            let today = new Date().toISOString().split('T')[0].replace(/-/g, '');
            a.download = `${today}商品汇总_${groupName}.xlsx`;
            a.click();
            window.URL.revokeObjectURL(url);
        },
        error: function(xhr) {
            let errorMsg = '导出失败，请重试';
            if (xhr.responseJSON) {
                errorMsg = xhr.responseJSON.msg || errorMsg;
            }
            alert(errorMsg);
        }
    });
}

// 8. 页面初始化（修改：调用恢复函数）
$(function(){
    // 加载区域组
    loadGroup();
    // 设置默认时间（解决时间框显示“一杆一杆”问题）
    const now = new Date();
    const pad = (num) => num.toString().padStart(2, '0');
    const defaultTime = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
    $('#s').val(defaultTime);
    $('#e').val(defaultTime);
    
    // 页面加载时尝试恢复数据（区域组加载完成后会再次调用，确保兼容性）
    restoreSummaryData();
});
</script>
{% endblock %}
