{% extends "base.html" %}

{% block title %}按区域组汇总客户金额 - EasyStock{% endblock %}

{% block extra_css %}
<style>
    /* 页面专属样式 */
    .query-form {
        margin-bottom: 20px;
    }
    .empty-data {
        text-align: center;
        padding: 20px;
        color: #666;
    }
</style>
{% endblock %}

{% block content %}
<h3>按区域组汇总客户消费金额（可精准到时分）</h3>

<!-- 返回按钮 -->
<div class="mb-3">
    <a href="/summary/page/" class="btn btn-sm btn-secondary">返回数据汇总主页</a>
</div>

<!-- 查询表单：date改为datetime-local -->
<div class="row my-3 g-2 query-form">
    <div class="col-auto">
        <select id="group" class="form-select form-select-sm">
            <option value="">请选择区域组</option> <!-- 默认提示选项 -->
        </select>
    </div>
    <div class="col-auto">
        <label class="form-label-sm mb-0">开始时间</label>
        <input type="datetime-local" id="s" class="form-control form-control-sm" placeholder="开始时间">
    </div>
    <div class="col-auto">
        <label class="form-label-sm mb-0">结束时间</label>
        <input type="datetime-local" id="e" class="form-control form-control-sm" placeholder="结束时间">
    </div>
    <div class="col-auto">
        <button class="btn btn-sm btn-primary" onclick="query()" style="margin-top: 24px;">查询汇总</button>
    </div>
</div>

<!-- 数据表格 -->
<table class="table table-sm table-bordered">
    <thead>
        <tr>
            <th>序号</th>
            <th>客户</th>
            <th>金额</th>
            <th>备注</th>
        </tr>
    </thead>
    <tbody id="data"></tbody>
</table>
{% endblock %}

{% block extra_js %}
<script>
// 加载区域组列表（逻辑和原有一致）
function loadGroup(){
    $.get('/summary/group/list/', function(res) {
        // 兼容接口返回列表/错误的情况
        if (res.code === 0) {
            alert(res.msg);
            return;
        }
        let opt = '<option value="">请选择区域组</option>'; // 默认选项
        res.forEach(g => opt += `<option value="${g.id}">${g.name}</option>`);
        $('#group').html(opt);
    }).fail(function() {
        alert('加载区域组失败，请检查接口是否正常');
    });
}

// 查询客户金额汇总（适配时间筛选）
function query(){
    let group_id = $('#group').val();
    let start_time = $('#s').val();
    let end_time = $('#e').val();

    // 基础校验
    if (!group_id) return alert('请先选择区域组');
    if (!start_time || !end_time) return alert('请选择完整的时间范围');
    
    // 时间格式校验 & 大小比较
    const start = new Date(start_time);
    const end = new Date(end_time);
    if (isNaN(start.getTime()) || isNaN(end.getTime())) {
        return alert('时间格式错误，请选择有效的时间');
    }
    if (start > end) return alert('开始时间不能晚于结束时间');

    // 发起查询
    $.get('/summary/customer-by-group/', {
        group_id: group_id,
        start_date: start_time,
        end_date: end_time
    }, function(res) {
        if (res.code !== 1) {
            alert(res.msg || '查询失败');
            $('#data').html('');
            return;
        }
        // 处理空数据
        if (res.data.length === 0) {
            $('#data').html('<tr><td colspan="4" class="empty-data">该时间段内无客户消费数据</td></tr>');
            return;
        }
        // 渲染客户汇总数据
        let html = '';
        res.data.forEach((i, index) => {
            html += `<tr>
                <td>${index + 1}</td>
                <td>${i.customer_name}</td>
                <td>¥${i.total_amount.toFixed(2)}</td>
                <td>${i.remark || '-'}</td>
            </tr>`;
        });
        $('#data').html(html);
    }).fail(function() {
        alert('查询失败，请检查网络或接口');
    });
}

// 页面加载初始化（设置默认时间为当前时间）
$(function(){
    loadGroup();
    // 设置默认时间为当前时间
    const now = new Date();
    const pad = (num) => num.toString().padStart(2, '0');
    const defaultTime = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
    $('#s').val(defaultTime);
    $('#e').val(defaultTime);
});
</script>
{% endblock %}
