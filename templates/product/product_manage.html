<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>商品管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        /* 新增商品表单 */
        .add-form {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .form-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-item label {
            font-size: 14px;
            color: #666;
        }
        .form-item input {
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            width: 200px;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #0066cc;
            color: #fff;
        }
        .btn-primary:hover {
            background: #0055bb;
        }
        .btn-danger {
            background: #ff4400;
            color: #fff;
        }
        .btn-danger:hover {
            background: #dd3300;
        }
        .btn-success {
            background: #009900;
            color: #fff;
        }
        .btn-success:hover {
            background: #008800;
        }
        /* 商品列表 */
        .product-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .product-table th, .product-table td {
            border: 1px solid #ddd;
            padding: 12px 15px;
            text-align: left;
        }
        .product-table th {
            background: #e9e9e9;
            font-weight: bold;
            color: #333;
        }
        .product-table tr:hover {
            background: #f9f9f9;
        }
        /* 别名管理样式 */
        .alias-item {
            display: inline-flex;
            align-items: center;
            background: #e0efff;
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        .alias-del {
            margin-left: 5px;
            cursor: pointer;
            color: #ff4400;
            font-size: 12px;
        }
        .alias-add {
            margin-top: 5px;
            font-size: 12px;
            color: #0066cc;
            cursor: pointer;
        }
        /* 编辑弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            width: 500px;
        }
        .modal-title {
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .modal-footer {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        /* 提示消息 */
        .msg {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        .msg-success {
            background: #dff0d8;
            color: #3c763d;
            display: block;
        }
        .msg-error {
            background: #f2dede;
            color: #a94442;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>商品管理系统</h1>
        
        <!-- 提示消息 -->
        <div id="msg-box" class="msg"></div>
        
        <!-- 新增商品表单 -->
        <div class="add-form">
            <div class="form-item">
                <label>商品名称</label>
                <input type="text" id="add-name" placeholder="请输入商品名称">
            </div>
            <div class="form-item">
                <label>单价（¥）</label>
                <input type="number" id="add-price" placeholder="0.00" min="0" step="0.01" value="0.00">
            </div>
            <div class="form-item">
                <label>单位</label>
                <input type="text" id="add-unit" placeholder="件/斤/瓶等" value="件">
            </div>
            <div class="form-item">
                <label>库存数量</label>
                <input type="number" id="add-stock" placeholder="77" min="0" value="77">
            </div>
            <!-- 关键1：移除onclick，只保留ID -->
            <button class="btn btn-primary" id="btn-add-product">新增商品</button>
        </div>

        <!-- 商品列表 -->
        <table class="product-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>商品名称</th>
                    <th>单价（¥）</th>
                    <th>单位</th>
                    <th>库存数量</th>
                    <th>商品别名</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="product-list">
                <tr><td colspan="7" style="text-align:center; color:#999;">暂无商品数据</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 编辑商品弹窗 -->
    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <div class="modal-title">编辑商品</div>
            <div class="modal-form">
                <input type="hidden" id="edit-id">
                <div class="form-item">
                    <label>商品名称</label>
                    <input type="text" id="edit-name" placeholder="请输入商品名称">
                </div>
                <div class="form-item">
                    <label>单价（¥）</label>
                    <input type="number" id="edit-price" placeholder="0.00" min="0" step="0.01">
                </div>
                <div class="form-item">
                    <label>单位</label>
                    <input type="text" id="edit-unit" placeholder="件/斤/瓶等">
                </div>
                <div class="form-item">
                    <label>库存数量</label>
                    <input type="number" id="edit-stock" placeholder="77" min="0">
                </div>
                <div class="form-item">
                    <label>商品别名</label>
                    <div id="edit-aliases">
                        <span style="color: #999;">暂无别名</span>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <input type="text" id="new-alias" placeholder="输入新别名">
                        <button class="btn btn-success" id="btn-add-alias" style="padding: 4px 10px; font-size: 12px;">添加别名</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" id="btn-close-modal">取消</button>
                <button class="btn btn-primary" id="btn-save-edit">保存修改</button>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let currentEditProductId = null;
        let currentAliases = [];

        // 工具函数：显示提示
        function showMsg(text, isSuccess = true) {
            const msgBox = document.getElementById('msg-box');
            msgBox.textContent = text;
            msgBox.className = isSuccess ? 'msg msg-success' : 'msg msg-error';
            setTimeout(() => { msgBox.className = 'msg'; }, 3000);
        }

        // 工具函数：获取CSRF Token
        function getCsrfToken() {
            let token = '';
            document.cookie.split(';').forEach(cookie => {
                const [name, val] = cookie.trim().split('=');
                if (name === 'csrftoken') token = val;
            });
            return token;
        }

        // 核心函数：新增商品（确保100%定义）
        function addProduct() {
            const name = document.getElementById('add-name').value.trim();
            const price = document.getElementById('add-price').value.trim();
            const unit = document.getElementById('add-unit').value.trim();
            const stock = document.getElementById('add-stock').value.trim();

            // 表单验证
            if (!name) {
                showMsg('商品名称不能为空', false);
                return;
            }
            if (!price || parseFloat(price) < 0) {
                showMsg('请输入有效的单价', false);
                return;
            }

            // 发送AJAX请求
            fetch('/product/add/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRFToken': getCsrfToken()
                },
                body: `name=${encodeURIComponent(name)}&price=${price}&unit=${encodeURIComponent(unit)}&stock=${stock}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 1) {
                    showMsg(data.msg);
                    // 清空表单
                    document.getElementById('add-name').value = '';
                    document.getElementById('add-price').value = '0.00';
                    document.getElementById('add-unit').value = '件';
                    document.getElementById('add-stock').value = '77';
                    // 重新加载列表（简化版：仅提示，后续可完善）
                    showMsg('商品新增成功，刷新页面查看列表', true);
                } else {
                    showMsg(data.msg, false);
                }
            })
            .catch(error => {
                showMsg('新增商品失败：' + error.message, false);
                console.error('新增失败：', error);
            });
        }

        // ========== 关键2：DOM加载完成后绑定所有事件 ==========
        document.addEventListener('DOMContentLoaded', function() {
            // 绑定新增商品按钮
            document.getElementById('btn-add-product').addEventListener('click', addProduct);
            
            // 其他按钮绑定（暂时留空，先确保新增功能可用）
            document.getElementById('btn-close-modal').addEventListener('click', function() {
                document.getElementById('edit-modal').style.display = 'none';
            });
            document.getElementById('btn-save-edit').addEventListener('click', function() {
                showMsg('编辑功能暂未完善', false);
            });
            document.getElementById('btn-add-alias').addEventListener('click', function() {
                showMsg('别名功能暂未完善', false);
            });
        });
    </script>
</body>
</html>
