{% extends "base.html" %}

{% block title %}商品管理系统 - EasyStock{% endblock %}

{% block extra_css %}
    <style>
        /* 原有样式保留 */
        .product-manage-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            font-family: "Microsoft YaHei", sans-serif;
        }
        
        .product-manage-container * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .product-manage-container h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .product-manage-container .search-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        .product-manage-container .search-input {
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            width: 300px;
        }
        .product-manage-container .add-form {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .product-manage-container .form-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .product-manage-container .form-item label {
            font-size: 14px;
            color: #666;
        }
        .product-manage-container .form-item input {
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            width: 200px;
        }
        .product-manage-container .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .product-manage-container .btn-primary {
            background: #0066cc;
            color: #fff;
        }
        .product-manage-container .btn-primary:hover {
            background: #0055bb;
        }
        .product-manage-container .btn-danger {
            background: #ff4400;
            color: #fff;
        }
        .product-manage-container .btn-danger:hover {
            background: #dd3300;
        }
        .product-manage-container .btn-success {
            background: #009900;
            color: #fff;
        }
        .product-manage-container .btn-success:hover {
            background: #008800;
        }
        .product-manage-container .btn-default {
            background: #e9e9e9;
            color: #333;
        }
        .product-manage-container .btn-default:hover {
            background: #ddd;
        }
        .product-manage-container .product-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .product-manage-container .product-table th, .product-manage-container .product-table td {
            border: 1px solid #ddd;
            padding: 12px 15px;
            text-align: left;
        }
        .product-manage-container .product-table th {
            background: #e9e9e9;
            font-weight: bold;
            color: #333;
        }

        /* ========== 新增/修改 行样式 ========== */
        /* 正常行默认样式 */
        .product-manage-container .product-table tbody tr {
            transition: background-color 0.2s ease;
            cursor: pointer; /* 提示可点击 */
        }
        /* 正常行hover高亮 */
        .product-manage-container .product-table tbody tr:not(.disabled-row):hover {
            background: #f0f8ff; /* 浅蓝色高亮 */
        }
        /* 禁用/下架行默认样式 */
        .product-manage-container .product-table tbody tr.disabled-row {
            background: #f5f5f5; /* 浅灰底 */
            color: #999;
        }
        /* 禁用行hover样式（低对比度高亮） */
        .product-manage-container .product-table tbody tr.disabled-row:hover {
            background: #eeeeee; /* 比默认浅灰稍深，对比度低 */
        }
        /* 行内按钮默认样式 */
        .product-manage-container .product-table .row-btn {
            transition: background-color 0.2s ease;
        }
       
       
        /* 取消按钮的默认hover样式，统一由行hover控制 */
        .product-manage-container .product-table .row-btn:hover {
            background: inherit !important;
        }

        .product-manage-container .alias-item {
            display: inline-flex;
            align-items: center;
            background: #e0efff;
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        .product-manage-container .alias-del {
            margin-left: 5px;
            cursor: pointer;
            color: #ff4400;
            font-size: 12px;
        }
        .product-manage-container .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .product-manage-container .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            width: 800px;
            max-width: 90%;
        }
        .product-manage-container .modal-title {
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .product-manage-container .modal-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .product-manage-container .modal-footer {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .product-manage-container .msg {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        .product-manage-container .msg-success {
            background: #dff0d8;
            color: #3c763d;
            display: block;
        }
        .product-manage-container .msg-error {
            background: #f2dede;
            color: #a94442;
            display: block;
        }

        /* 快速出入库表格样式 */
        .stock-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .stock-table th, .stock-table td {
            border: 1px solid #000;
            padding: 8px;
            text-align: center;
            position: relative;
        }
        .stock-table th {
            background: #e9e9e9;
            font-weight: bold;
        }
        .stock-table input {
            width: 95%;
            padding: 6px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-size: 14px;
            outline: none;
        }
        .stock-table input:focus {
            border-color: #0066cc;
        }
        .serial-cell {
            font-weight: bold;
            color: #666;
        }
        .btn-del {
            padding: 4px 8px;
            background: #ff4400;
            color: #fff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-del:hover {
            background: #dd3300;
        }
        .btn-add-row {
            padding: 8px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .btn-add-row:hover {
            background: #0055bb;
        }

        /* 输入法式候选框 */
        .suggest-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            min-width: 350px;
            max-width: 500px;
            width: auto !important;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 9999;
            font-size: 14px;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
        }
        .suggest-dropdown div {
            padding: 6px 12px;
            cursor: pointer;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }
        .suggest-dropdown div:hover,
        .suggest-dropdown div.active {
            background: #0066cc;
            color: #fff;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="product-manage-container">
        <h1>商品管理系统</h1>
        
        <!-- 提示消息 -->
        <div id="msg-box" class="msg"></div>

        <!-- 商品搜索栏 -->
        <div class="search-form">
            <input type="text" id="search-keyword" class="search-input" placeholder="搜索商品名称/别名...">
            <button class="btn btn-primary" id="btn-search">搜索</button>
            <button class="btn btn-default" id="btn-reset-search">重置</button>
            <!-- 新增：快速出入库按钮 -->
            <button class="btn btn-success" id="btn-quick-stock" style="margin-left: 20px;">快速出入库</button>
        </div>
        
        <!-- 新增商品表单 -->
        <div class="add-form">
            <div class="form-item">
                <label>商品名称</label>
                <input type="text" id="add-name" placeholder="请输入商品名称">
            </div>
            <div class="form-item">
                <label>单价（¥）</label>
                <input type="number" id="add-price" placeholder="0.00" min="0" step="0.01" value="0.00">
            </div>
            <div class="form-item">
                <label>单位</label>
                <input type="text" id="add-unit" placeholder="件/斤/瓶等" value="件">
            </div>
            <div class="form-item">
                <label>库存数量</label>
                <input type="number" id="add-stock" placeholder="77" min="0" value="77">
            </div>
            <button class="btn btn-primary" id="btn-add-product">新增商品</button>
            
            <!-- Excel导入控件 -->
            <div style="margin-left: 20px; display: flex; align-items: center; gap: 10px;">
                <input type="file" id="import-file" accept=".xlsx,.xls" style="font-size: 14px;">
                <button class="btn btn-success" id="btn-import-product">批量导入商品</button>
            </div>
        </div>

        <!-- 商品列表 -->
        <table class="product-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>商品名称</th>
                    <th>单价（¥）</th>
                    <th>单位</th>
                    <th>库存数量</th>
                    <th>商品别名</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="product-list">
                <tr><td colspan="7" style="text-align:center; color:#999;">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 编辑商品弹窗 -->
    <div class="product-manage-container">
        <div class="modal" id="edit-modal">
            <div class="modal-content">
                <div class="modal-title">编辑商品</div>
                <div class="modal-form">
                    <input type="hidden" id="edit-id">
                    <div class="form-item">
                        <label>商品名称</label>
                        <input type="text" id="edit-name" placeholder="请输入商品名称">
                    </div>
                    <div class="form-item">
                        <label>单价（¥）</label>
                        <input type="number" id="edit-price" placeholder="0.00" min="0" step="0.01">
                    </div>
                    <div class="form-item">
                        <label>单位</label>
                        <input type="text" id="edit-unit" placeholder="件/斤/瓶等">
                    </div>
                    <div class="form-item">
                        <label>库存数量</label>
                        <input type="number" id="edit-stock" placeholder="77" min="0">
                    </div>
                    <div class="form-item">
                        <label>商品别名</label>
                        <div id="edit-aliases">
                            <span style="color: #999;">暂无别名</span>
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 10px;">
                            <input type="text" id="new-alias" placeholder="输入新别名">
                            <button class="btn btn-success" id="btn-add-alias" style="padding: 4px 10px; font-size: 12px;">添加别名</button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-default" id="btn-close-modal">取消</button>
                    <button class="btn btn-primary" id="btn-save-edit">保存修改</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增：快速出入库弹窗 -->
    <div class="product-manage-container">
        <div class="modal" id="stock-modal">
            <div class="modal-content">
                <div class="modal-title">
                    快速出入库
                    <button class="btn btn-default" id="btn-close-stock-modal" style="padding: 4px 10px; font-size: 12px;">关闭</button>
                </div>
                
                <button class="btn-add-row" onclick="addStockRow()">新增空白行</button>
                
                <table class="stock-table" id="stock-table">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>商品名称</th>
                            <th>入库数量</th>
                            <th>出库数量</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="stock-tbody"></tbody>
                </table>
                
                <div class="modal-footer">
                    <button class="btn btn-default" id="btn-cancel-stock">取消</button>
                    <button class="btn btn-success" id="btn-save-stock">一键出入库</button>
                </div>
            </div>
        </div>
    </div>
{% endblock %}


{% block extra_js %}
    <script>
        // 原有变量保留
        let currentEditProductId = null;
        let currentAliases = [];
        let allProducts = [];

        // 新增：快速出入库相关变量
        let stockRowIdCounter = 0;
        const stockInputColsCount = 3; // 商品名称、入库数量、出库数量
        let currentStockSearchInput = null;
        let currentStockSuggestList = [];
        let suggestBox = null;

        // 工具函数：显示提示
        function showMsg(text, isSuccess = true) {
            const msgBox = document.getElementById('msg-box');
            msgBox.textContent = text;
            msgBox.className = isSuccess ? 'msg msg-success' : 'msg msg-error';
            setTimeout(() => { msgBox.className = 'msg'; }, 3000);
        }

        // ========== 新增：跳转到商品详情页函数 ==========
        function goToProductDetail(productId) {
            window.location.href = `/product/detail/${productId}/`;
        }

        // ========== 原有商品列表渲染逻辑修改 ==========
        function renderProductList(products = []) {
            const productList = document.getElementById('product-list');
            if (products.length === 0) {
                productList.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#999;">暂无商品数据</td></tr>';
                return;
            }

            productList.innerHTML = '';
            products.forEach(product => {
                let aliasHtml = '';
                if (product.aliases && product.aliases.length > 0) {
                    product.aliases.forEach(alias => {
                        aliasHtml += `<span class="alias-item">${alias.alias_name}<span class="alias-del" onclick="deleteAlias(${alias.id})">×</span></span>`;
                    });
                } else {
                    aliasHtml = '<span style="color: #999;">暂无别名</span>';
                }

                const tr = document.createElement('tr');
                // 新增：给禁用/下架商品添加样式类（假设product有status字段，0=禁用/下架，1=正常）
                if (product.status === 0) {
                    tr.classList.add('disabled-row');
                }

                // 移除商品名称的a标签，改为整行点击跳转
                tr.innerHTML = `
                    <td>${product.id || ''}</td>
                    <td>${product.name || ''}</td>
                    <td>${parseFloat(product.price).toFixed(2)}</td>
                    <td>${product.unit || '件'}</td>
                    <td>${product.stock || 0}</td>
                    <td>${aliasHtml}</td>
                    <td>
                        <button class="btn btn-primary row-btn" onclick="editProduct(${product.id}); event.stopPropagation();" style="padding: 4px 10px; font-size: 12px; margin-right: 5px;">编辑</button>
                        <button class="btn btn-danger row-btn" onclick="deleteProduct(${product.id}); event.stopPropagation();" style="padding: 4px 10px; font-size: 12px;">删除</button>
                    </td>
                `;

                // 新增：整行点击事件（排除按钮）
                tr.addEventListener('click', () => {
                    goToProductDetail(product.id);
                });

                productList.appendChild(tr);
            });
        }

        async function loadProductList() {
            try {
                const res = await fetch('/product/manage/data/');
                if (!res.ok) throw new Error('接口请求失败');
                
                const products = await res.json();
                allProducts = products;
                renderProductList(products);
            } catch (error) {
                showMsg('加载商品列表失败：' + error.message, false);
                console.error('加载商品失败：', error);
                renderProductList([]);
            }
        }

        // ========== 原有商品CRUD逻辑保留 ==========
        async function addProduct() {
            const name = document.getElementById('add-name').value.trim();
            const price = document.getElementById('add-price').value.trim();
            const unit = document.getElementById('add-unit').value.trim();
            const stock = document.getElementById('add-stock').value.trim();

            if (!name) {
                showMsg('商品名称不能为空', false);
                return;
            }
            if (!price || parseFloat(price) < 0) {
                showMsg('请输入有效的单价', false);
                return;
            }

            try {
                const res = await fetch('/product/add/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': getCsrfToken()
                    },
                    body: `name=${encodeURIComponent(name)}&price=${price}&unit=${encodeURIComponent(unit)}&stock=${stock}`
                });
                const data = await res.json();
                if (data.code === 1) {
                    showMsg(data.msg);
                    document.getElementById('add-name').value = '';
                    document.getElementById('add-price').value = '0.00';
                    document.getElementById('add-unit').value = '件';
                    document.getElementById('add-stock').value = '77';
                    loadProductList();
                } else {
                    showMsg(data.msg, false);
                }
            } catch (error) {
                showMsg('新增商品失败：' + error.message, false);
                console.error(error);
            }
        }

        async function editProduct(productId) {
            currentEditProductId = productId;
            try {
                const res = await fetch(`/product/edit/data/${productId}/`, {
                    method: 'GET',
                    headers: { 'X-CSRFToken': getCsrfToken() }
                });
                if (!res.ok) throw new Error('获取商品详情失败');
                
                const product = await res.json();
                if (!product) {
                    showMsg('商品数据不存在', false);
                    return;
                }

                document.getElementById('edit-id').value = product.id || '';
                document.getElementById('edit-name').value = product.name || '';
                document.getElementById('edit-price').value = product.price || '0.00';
                document.getElementById('edit-unit').value = product.unit || '件';
                document.getElementById('edit-stock').value = product.stock || '77';

                currentAliases = product.aliases || [];
                renderEditAliases();

                document.getElementById('edit-modal').style.display = 'flex';
            } catch (error) {
                showMsg('加载商品详情失败：' + error.message, false);
                console.error(error);
            }
        }

        function renderEditAliases() {
            const aliasContainer = document.getElementById('edit-aliases');
            aliasContainer.innerHTML = '';
            
            if (currentAliases && currentAliases.length > 0) {
                currentAliases.forEach(alias => {
                    const aliasItem = document.createElement('div');
                    aliasItem.className = 'alias-item';
                    aliasItem.innerHTML = `${alias.alias_name || ''}<span class="alias-del" onclick="deleteEditAlias(${alias.id})">×</span>`;
                    aliasContainer.appendChild(aliasItem);
                });
            } else {
                aliasContainer.innerHTML = '<span style="color: #999;">暂无别名</span>';
            }
        }

        async function saveEdit() {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('edit-name').value.trim();
            const price = document.getElementById('edit-price').value.trim();
            const unit = document.getElementById('edit-unit').value.trim();
            const stock = document.getElementById('edit-stock').value.trim();

            if (!name) {
                showMsg('商品名称不能为空', false);
                return;
            }
            if (!price || parseFloat(price) < 0) {
                showMsg('请输入有效的单价', false);
                return;
            }

            try {
                const res = await fetch(`/product/edit/${id}/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': getCsrfToken()
                    },
                    body: `name=${encodeURIComponent(name)}&price=${price}&unit=${encodeURIComponent(unit)}&stock=${stock}`
                });
                const data = await res.json();
                if (data.code === 1) {
                    showMsg(data.msg);
                    closeModal();
                    loadProductList();
                } else {
                    showMsg(data.msg, false);
                }
            } catch (error) {
                showMsg('保存修改失败：' + error.message, false);
                console.error(error);
            }
        }

        function closeModal() {
            document.getElementById('edit-modal').style.display = 'none';
            currentEditProductId = null;
            currentAliases = [];
            document.getElementById('edit-id').value = '';
            document.getElementById('edit-name').value = '';
            document.getElementById('edit-price').value = '0.00';
            document.getElementById('edit-unit').value = '件';
            document.getElementById('edit-stock').value = '77';
            document.getElementById('new-alias').value = '';
        }

        async function deleteProduct(productId) {
            if (!confirm('确定要删除这个商品吗？删除后别名也会被移除！')) return;

            try {
                const res = await fetch(`/product/delete/${productId}/`, {
                    method: 'POST',
                    headers: { 'X-CSRFToken': getCsrfToken() }
                });
                const data = await res.json();
                if (data.code === 1) {
                    showMsg(data.msg);
                    loadProductList();
                } else {
                    showMsg(data.msg, false);
                }
            } catch (error) {
                showMsg('删除商品失败：' + error.message, false);
                console.error(error);
            }
        }

        // ========== 原有别名管理逻辑保留 ==========
        async function addAlias() {
            if (!currentEditProductId) {
                showMsg('请先选择要编辑的商品', false);
                return;
            }
            
            const aliasName = document.getElementById('new-alias').value.trim();
            if (!aliasName) {
                showMsg('别名不能为空', false);
                return;
            }

            try {
                const res = await fetch('/product/alias/add/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': getCsrfToken()
                    },
                    body: `product_id=${currentEditProductId}&alias_name=${encodeURIComponent(aliasName)}`
                });
                const data = await res.json();
                if (data.code === 1) {
                    showMsg(data.msg);
                    currentAliases.push({
                        id: data.data.id,
                        alias_name: data.data.alias_name
                    });
                    renderEditAliases();
                    document.getElementById('new-alias').value = '';
                } else {
                    showMsg(data.msg, false);
                }
            } catch (error) {
                showMsg('新增别名失败：' + error.message, false);
                console.error(error);
            }
        }

        async function deleteEditAlias(aliasId) {
            if (!confirm('确定要删除这个别名吗？')) return;

            try {
                const res = await fetch(`/product/alias/delete/${aliasId}/`, {
                    method: 'POST',
                    headers: { 'X-CSRFToken': getCsrfToken() }
                });
                const data = await res.json();
                if (data.code === 1) {
                    showMsg(data.msg);
                    currentAliases = currentAliases.filter(alias => alias.id !== aliasId);
                    renderEditAliases();
                } else {
                    showMsg(data.msg, false);
                }
            } catch (error) {
                showMsg('删除别名失败：' + error.message, false);
                console.error(error);
            }
        }

        async function deleteAlias(aliasId) {
            if (!confirm('确定要删除这个别名吗？')) return;

            try {
                const res = await fetch(`/product/alias/delete/${aliasId}/`, {
                    method: 'POST',
                    headers: { 'X-CSRFToken': getCsrfToken() }
                });
                const data = await res.json();
                if (data.code === 1) {
                    showMsg(data.msg);
                    loadProductList();
                } else {
                    showMsg(data.msg, false);
                }
            } catch (error) {
                showMsg('删除别名失败：' + error.message, false);
                console.error(error);
            }
        }

        // ========== 原有搜索逻辑保留 ==========
        function searchProduct() {
            const keyword = document.getElementById('search-keyword').value.trim().toLowerCase();
            if (!keyword) {
                renderProductList(allProducts);
                return;
            }

            const filteredProducts = allProducts.filter(product => {
                if (product.name?.toLowerCase().includes(keyword)) return true;
                if (product.aliases && product.aliases.some(alias => alias.alias_name?.toLowerCase().includes(keyword))) {
                    return true;
                }
                return false;
            });

            renderProductList(filteredProducts);
        }

        function resetSearch() {
            document.getElementById('search-keyword').value = '';
            renderProductList(allProducts);
        }

        // ========== 原有导入逻辑保留 ==========
        async function importProduct() {
            const fileInput = document.getElementById('import-file');
            if (!fileInput.files || fileInput.files.length === 0) {
                showMsg('请选择要导入的Excel文件', false);
                return;
            }

            const file = fileInput.files[0];
            if (!file.name.endsWith('.xlsx') && !file.name.endsWith('.xls')) {
                showMsg('仅支持xlsx/xls格式的Excel文件', false);
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                showMsg('正在导入商品数据，请稍候...', true);
                const res = await fetch('/product/import/', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCsrfToken()
                    },
                    body: formData
                });
                const data = await res.json();
                if (data.code === 1) {
                    showMsg(data.msg, true);
                    fileInput.value = '';
                    loadProductList();
                } else {
                    showMsg(data.msg, false);
                }
            } catch (error) {
                showMsg('导入失败：' + error.message, false);
                console.error('导入商品失败：', error);
            }
        }

        // ========== 新增：快速出入库功能 ==========
        // 初始化候选框
        function initSuggestBox() {
            suggestBox = document.createElement('div');
            suggestBox.className = 'suggest-dropdown';
            document.body.appendChild(suggestBox);
        }

        function hideSuggest() {
            if (suggestBox) suggestBox.style.display = 'none';
            currentStockSearchInput = null;
            currentStockSuggestList = [];
        }

        function hideAllSuggest(e) {
            if (e && e.target.closest('.suggest-dropdown')) return;
            if (e && e.target.classList.contains('stock-name-input')) return;
            hideSuggest();
        }

        // 商品搜索逻辑（适配出入库）
        async function onStockProductInput(input) {
            const keyword = input.value.trim();
            if (!keyword) {
                hideSuggest();
                return;
            }
            currentStockSearchInput = input;
            try {
                const res = await fetch(`/bill/search-product/?keyword=${encodeURIComponent(keyword)}`);
                const data = await res.json();
                if (data.code === 1 && data.data.length > 0) {
                    currentStockSuggestList = data.data;
                    showStockSuggest(input, data.data);
                } else {
                    hideSuggest();
                }
            } catch (e) { hideSuggest(); }
        }

        function showStockSuggest(input, list) {
            const rect = input.getBoundingClientRect();
            suggestBox.style.left = rect.left + 'px';
            suggestBox.style.top = (rect.bottom + window.scrollY) + 'px';
            suggestBox.innerHTML = '';

            list.slice(0, 8).forEach((item, idx) => {
                const div = document.createElement('div');
                div.textContent = `${idx+1} ${item.name}  当前库存：${item.stock}${item.unit}`;
                div.dataset.index = idx;
                div.onclick = () => selectStockItem(idx);
                suggestBox.appendChild(div);
            });
            suggestBox.style.display = 'block';
        }

        function selectStockItem(index) {
            const item = currentStockSuggestList[index];
            if (!item || !currentStockSearchInput) return;
            const tr = currentStockSearchInput.closest('tr');
            const nameInput = tr.querySelector('.stock-name-input');
            nameInput.value = item.name;
            nameInput.dataset.productId = item.id;
            nameInput.dataset.stock = item.stock;
            hideSuggest();
        }

        function handleStockInputKey(e) {
            if (!currentStockSuggestList.length) return;
            if (e.key === ' ') {
                e.preventDefault();
                selectStockItem(0);
            }
            const num = parseInt(e.key);
            if (!isNaN(num) && num >= 1 && num <= currentStockSuggestList.length) {
                e.preventDefault();
                selectStockItem(num - 1);
            }
            if (e.key === 'Escape') hideSuggest();
        }

        // 创建出入库输入框
        function createStockInputElement(type, className, placeholder, value = '') {
            const input = document.createElement('input');
            input.type = type;
            input.className = className;
            input.placeholder = placeholder;
            input.value = value;

            if (type === 'number') {
                input.min = 0;
                input.step = 1;
            }

            if (className === 'stock-name-input') {
                input.addEventListener('input', () => onStockProductInput(input));
                input.addEventListener('keydown', handleStockInputKey);
            }

            bindStockInputKeyboardEvents(input);
            return input;
        }

        // 绑定键盘事件
        function bindStockInputKeyboardEvents(input) {
            input.addEventListener('keydown', e => {
                // Shift+Enter 一键出入库
                if (e.shiftKey && e.key === 'Enter') {
                    e.preventDefault();
                    saveStockOperation();
                    return;
                }

                if (e.key === 'Enter') { e.preventDefault(); handleStockEnterKey(input); }
                const dir = ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'];
                if (dir.includes(e.key)) { e.preventDefault(); handleStockDirectionKeys(input,e.key); }
                if (e.shiftKey && (e.key === 'Backspace' || e.key === 'Delete')) {
                    e.preventDefault();
                    handleStockDeleteRowByKey(input);
                }
            });
        }

        // 回车处理
        function handleStockEnterKey(input) {
            const tr = input.closest('tr');
            const inputs = tr.querySelectorAll('input');
            const idx = Array.from(inputs).indexOf(input);
            if (idx < stockInputColsCount - 1) {
                inputs[idx+1].focus(); 
                inputs[idx+1].select();
            } else {
                const newTr = addStockRow(true);
                newTr.querySelector('.stock-name-input').focus();
            }
        }

        // 方向键处理
        function handleStockDirectionKeys(input, key) {
            const tr = input.closest('tr');
            const allTr = Array.from(document.querySelectorAll('#stock-tbody tr'));
            const trIdx = allTr.indexOf(tr);
            const inputs = tr.querySelectorAll('input');
            const idx = Array.from(inputs).indexOf(input);
            const rowCount = allTr.length;

            switch(key) {
                case 'ArrowLeft':
                    const l = idx === 0 ? stockInputColsCount-1 : idx-1;
                    inputs[l].focus(); 
                    inputs[l].select(); 
                    break;
                case 'ArrowRight':
                    const r = idx === stockInputColsCount-1 ? 0 : idx+1;
                    inputs[r].focus(); 
                    inputs[r].select(); 
                    break;
                case 'ArrowUp':
                    const upTr = allTr[trIdx === 0 ? rowCount-1 : trIdx-1];
                    upTr.querySelectorAll('input')[idx].focus(); 
                    break;
                case 'ArrowDown':
                    const dnTr = allTr[trIdx === rowCount-1 ? 0 : trIdx+1];
                    dnTr.querySelectorAll('input')[idx].focus(); 
                    break;
            }
        }

        // 删除行处理
        function handleStockDeleteRowByKey(input) {
            const tr = input.closest('tr');
            const tbody = document.getElementById('stock-tbody');
            if (tbody.children.length <= 1) {
                alert('至少保留1行');
                return;
            }

            const allTr = Array.from(tbody.querySelectorAll('tr'));
            const trIdx = allTr.indexOf(tr);
            const inputs = tr.querySelectorAll('input');
            const inputIdx = Array.from(inputs).indexOf(input);

            tr.remove();
            updateStockRowNumbers();

            const newAllTr = Array.from(tbody.querySelectorAll('tr'));
            if (newAllTr.length > 0) {
                const targetTrIdx = trIdx > 0 ? trIdx - 1 : 0;
                const targetTr = newAllTr[targetTrIdx];
                const targetInputs = targetTr.querySelectorAll('input');
                const targetInputIdx = inputIdx < targetInputs.length ? inputIdx : targetInputs.length - 1;
                const targetInput = targetInputs[targetInputIdx];
                targetInput.focus();
                targetInput.select();
            }
        }

        // 更新序号
        function updateStockRowNumbers() {
            document.querySelectorAll('#stock-tbody tr').forEach((r,i)=>{
                r.querySelector('.serial-cell').textContent = i+1;
            });
        }

        // 添加空白行
        function addStockRow(returnRow=false) {
            stockRowIdCounter++;
            const tbody = document.getElementById('stock-tbody');
            const tr = document.createElement('tr');
            tr.dataset.rowId = stockRowIdCounter;
            tr.innerHTML = `
                <td class="serial-cell">${tbody.children.length+1}</td>
                <td></td><td></td><td></td>
                <td><button class="btn-del" onclick="deleteStockRow(this)">删除</button></td>`;
            tr.cells[1].appendChild(createStockInputElement('text','stock-name-input','商品名称/拼音'));
            tr.cells[2].appendChild(createStockInputElement('number','stock-in-input','入库数量',0));
            tr.cells[3].appendChild(createStockInputElement('number','stock-out-input','出库数量',0));
            tbody.appendChild(tr);
            updateStockRowNumbers();
            if (returnRow) return tr;
        }

        // 删除行
        function deleteStockRow(btn) {
            const tr = btn.closest('tr');
            const tbody = document.getElementById('stock-tbody');
            if (tbody.children.length <=1) { 
                alert('至少保留1行'); 
                return; 
            }
            tr.remove(); 
            updateStockRowNumbers();
        }

        // 打开快速出入库弹窗
        function openStockModal() {
            // 重置表格
            document.getElementById('stock-tbody').innerHTML = '';
            stockRowIdCounter = 0;
            
            // 添加初始行
            const firstRow = addStockRow(true);
            
            // 显示弹窗
            document.getElementById('stock-modal').style.display = 'flex';
            
            // 聚焦到第一个商品名称输入框
            const firstInput = firstRow.querySelector('.stock-name-input');
            setTimeout(() => {
                firstInput.focus();
                firstInput.select();
            }, 100);
        }

        // 关闭快速出入库弹窗
        function closeStockModal() {
            document.getElementById('stock-modal').style.display = 'none';
            hideSuggest();
        }

        // 保存出入库操作
        async function saveStockOperation() {
            const items = [];
            let hasValidData = false;
            
            document.querySelectorAll('#stock-tbody tr').forEach(tr=>{
                const nameInput = tr.querySelector('.stock-name-input');
                const productId = nameInput.dataset.productId || '';
                const name = nameInput.value.trim();
                const inQty = parseInt(tr.querySelector('.stock-in-input').value) || 0;
                const outQty = parseInt(tr.querySelector('.stock-out-input').value) || 0;
                const currentStock = parseInt(nameInput.dataset.stock) || 0;

                if (!productId || !name) return;
                
                // 验证出库数量
                if (outQty > 0 && outQty > currentStock) {
                    alert(`商品【${name}】出库数量${outQty}超过当前库存${currentStock}，操作失败！`);
                    return;
                }
                
                // 至少有入库或出库数量
                if (inQty > 0 || outQty > 0) {
                    items.push({
                        product_id: productId,
                        in_quantity: inQty,
                        out_quantity: outQty
                    });
                    hasValidData = true;
                }
            });
            
            if (!hasValidData) {
                alert('请填写有效的出入库数据！');
                return;
            }

            try {
                const res = await fetch('/product/quick-stock/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCsrfToken()
                    },
                    body: JSON.stringify({ items: items })
                });
                const data = await res.json();
                if (data.code === 1) {
                    showMsg(data.msg, true);
                    closeStockModal();
                    loadProductList(); // 刷新商品列表
                } else {
                    showMsg(data.msg, false);
                }
            } catch (error) {
                showMsg('出入库操作失败：' + error.message, false);
                console.error(error);
            }
        }

        // CSRF Token获取
        function getCsrfToken() {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, 10) === 'csrftoken=') {
                        cookieValue = decodeURIComponent(cookie.substring(10));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // ========== 初始化和事件绑定 ==========
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化候选框
            initSuggestBox();
            window.addEventListener('click', hideAllSuggest);

            // 聚焦搜索框
            const searchInput = document.getElementById('search-keyword');
            if (searchInput) {
                searchInput.focus();
            }

            // 加载商品列表
            loadProductList();

            // 绑定原有按钮事件
            document.getElementById('btn-add-product').addEventListener('click', addProduct);
            document.getElementById('btn-search').addEventListener('click', searchProduct);
            document.getElementById('btn-reset-search').addEventListener('click', resetSearch);
            document.getElementById('btn-close-modal').addEventListener('click', closeModal);
            document.getElementById('btn-save-edit').addEventListener('click', saveEdit);
            document.getElementById('btn-add-alias').addEventListener('click', addAlias);
            document.getElementById('btn-import-product').addEventListener('click', importProduct);
            document.getElementById('search-keyword').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') searchProduct();
            });

            // 绑定快速出入库按钮事件
            document.getElementById('btn-quick-stock').addEventListener('click', openStockModal);
            document.getElementById('btn-close-stock-modal').addEventListener('click', closeStockModal);
            document.getElementById('btn-cancel-stock').addEventListener('click', closeStockModal);
            document.getElementById('btn-save-stock').addEventListener('click', saveStockOperation);
        });
    </script>
