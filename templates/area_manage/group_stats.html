{% extends "base.html" %}

{% block title %}区域组统计 - EasyStock{% endblock %}

{% block extra_css %}
<style>
    .stats-card {
        background: white;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        text-align: center;
    }
    .stats-card .value {
        font-size: 28px;
        font-weight: bold;
        color: #333;
        margin: 10px 0;
    }
    .stats-card .label { color: #666; font-size: 14px; }
    .sales-color { color: #28a745 !important; }
    .debt-color { color: #dc3545 !important; }
    
    .filter-bar { 
        background: white; 
        padding: 15px; 
        border-radius: 8px; 
        margin-bottom: 20px; 
        display: flex; 
        align-items: center; 
        gap: 15px; 
        flex-wrap: wrap;
    }
    .filter-btn { padding: 6px 16px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; }
    .filter-btn.active { background: #007bff; color: white; border-color: #007bff; }
    
    .rank-badge { 
        display: inline-block; 
        width: 24px; 
        height: 24px; 
        line-height: 24px; 
        text-align: center; 
        border-radius: 50%; 
        font-weight: bold; 
        color: white;
    }
    .rank-1 { background: #ffc107; }
    .rank-2 { background: #adb5bd; }
    .rank-3 { background: #cd7f32; }
    .rank-other { background: #6c757d; }
</style>
{% endblock %}

{% block content %}
    <h3>区域组统计分析</h3>
    
    <!-- 筛选栏 -->
    <div class="filter-bar">
        <div>
            <strong>时间范围：</strong>
            <button class="filter-btn" onclick="changeTimeRange('today')">今日</button>
            <button class="filter-btn active" onclick="changeTimeRange('7days')">7天</button>
            <button class="filter-btn active" onclick="changeTimeRange('30days')" id="btn-30days">30天</button>
            <button class="filter-btn" onclick="changeTimeRange('month')">本月</button>
            <span style="margin:0 10px;">或自定义：</span>
            <input type="date" id="start-date" class="form-control form-control-sm" style="width:150px; display:inline;">
            <span>至</span>
            <input type="date" id="end-date" class="form-control form-control-sm" style="width:150px; display:inline;">
            <button class="btn btn-sm btn-primary" onclick="changeTimeRange('custom')">查询</button>
        </div>
        <div style="margin-left: auto;">
            <input type="text" id="search-input" class="form-control form-control-sm" placeholder="搜索区域组名称..." style="width:200px;" onkeydown="if(event.keyCode===13) loadData()">
            <button class="btn btn-sm btn-outline-secondary" onclick="loadData()">搜索</button>
        </div>
    </div>

    <!-- 顶部统计卡片 -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="stats-card">
                <div class="label">总订单数量</div>
                <div class="value" id="total-orders">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stats-card">
                <div class="label">总销售额</div>
                <div class="value sales-color" id="total-sales">¥0.00</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stats-card">
                <div class="label">总欠款</div>
                <div class="value debt-color" id="total-debt">¥0.00</div>
            </div>
        </div>
    </div>

    <!-- 排序栏 -->
    <div class="d-flex justify-content-between align-items-center mb-2">
        <div>
            <span>排序：</span>
            <button class="btn btn-sm btn-link" onclick="changeSort('sales')" id="sort-sales">按销售额</button>
            <span>|</span>
            <button class="btn btn-sm btn-link" onclick="changeSort('order_count')" id="sort-order">按订单量</button>
            <span>|</span>
            <button class="btn btn-sm btn-link" onclick="changeSort('debt')" id="sort-debt">按欠款</button>
        </div>
        <div class="text-muted small" id="date-range-display"></div>
    </div>

    <!-- 区域组列表 -->
    <table class="table table-sm table-bordered table-hover">
        <thead class="table-light">
            <tr>
                <th style="width:80px">排名</th>
                <th>区域组名称</th>
                <th style="width:150px">订单数量</th>
                <th style="width:180px">销售量 (金额)</th>
                <th style="width:120px">占比</th>
                <th style="width:180px">欠款</th>
            </tr>
        </thead>
        <tbody id="group-list-tbody">
            <tr><td colspan="6" class="text-center">加载中...</td></tr>
        </tbody>
    </table>
{% endblock %}

{% block extra_js %}
<script>
    let currentTimeRange = '30days';
    let currentSortBy = 'sales';

    $(document).ready(function(){
        loadData();
    });

    function changeTimeRange(range) {
        currentTimeRange = range;
        // 更新按钮样式
        $('.filter-btn').removeClass('active');
        if(range !== 'custom') {
            $(`.filter-btn:contains('${range === 'today' ? '今日' : range === '7days' ? '7天' : range === '30days' ? '30天' : '本月'}')`).addClass('active');
        }
        loadData();
    }

    function changeSort(sort) {
        currentSortBy = sort;
        loadData();
    }

    function loadData() {
        let startDate = '';
        let endDate = '';
        if(currentTimeRange === 'custom') {
            startDate = $('#start-date').val();
            endDate = $('#end-date').val();
            if(!startDate || !endDate) {
                alert('请选择完整的自定义日期范围');
                return;
            }
        }

        const keyword = $('#search-input').val().trim();

        let url = `/area-manage/api/group/stats/calculate/?time_range=${currentTimeRange}&sort_by=${currentSortBy}`;
        if(startDate) url += `&start_date=${startDate}&end_date=${endDate}`;
        if(keyword) url += `&keyword=${encodeURIComponent(keyword)}`;

        $.get(url, function(res){
            if(res.code !== 1) {
                alert(res.msg);
                return;
            }
            
            // 渲染顶部卡片
            $('#total-orders').text(res.global_stats.total_orders);
            $('#total-sales').text('¥' + res.global_stats.total_sales.toFixed(2));
            $('#total-debt').text('¥' + res.global_stats.total_debt.toFixed(2));
            
            // 渲染日期范围
            $('#date-range-display').text(`统计周期：${res.date_range.start} 至 ${res.date_range.end}`);

            // 渲染列表
            let html = '';
            if(res.group_list.length === 0) {
                html = '<tr><td colspan="6" class="text-center text-muted">暂无数据</td></tr>';
            } else {
                res.group_list.forEach(g => {
                    let rankClass = 'rank-other';
                    if(g.rank === 1) rankClass = 'rank-1';
                    else if(g.rank === 2) rankClass = 'rank-2';
                    else if(g.rank === 3) rankClass = 'rank-3';

                    html += `<tr>
                        <td><span class="rank-badge ${rankClass}">${g.rank}</span></td>
                        <td><strong>${g.group_name}</strong></td>
                        <td>${g.order_count}</td>
                        <td class="text-success fw-bold">¥${g.sales.toFixed(2)}</td>
                        <td>
                            <div class="progress" style="height: 8px; margin-bottom: 2px;">
                                <div class="progress-bar bg-primary" role="progressbar" style="width: ${g.contribution}%"></div>
                            </div>
                            <small>${g.contribution}%</small>
                        </td>
                        <td class="text-danger">¥${g.debt.toFixed(2)}</td>
                    </tr>`;
                });
            }
            $('#group-list-tbody').html(html);
        }, 'json').fail(function(){
            alert('加载统计数据失败，请重试');
        });
    }
</script>
{% endblock %}
