{% extends "base.html" %}

<!-- 页面标题 -->
{% block title %}区域管理 - EasyStock{% endblock %}

<!-- 页面专属样式 -->
{% block extra_css %}
<style>
    /* 1. 行高亮样式 */
    #list tr {
        transition: background-color 0.2s ease;
        cursor: pointer; /* 提示行可点击 */
    }
    /* 浅灰色高亮（覆盖table默认样式） */
    #list tr:hover td {
        background-color: #f1f1f1 !important;
    }
    /* 操作列光标重置 */
    #list tr td:last-child {
        cursor: default;
    }

    /* 搜索框样式 */
    .search-container {
        margin: 10px 0;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .search-input {
        padding: 4px 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        width: 300px;
    }
    .search-btn, .clear-btn {
        padding: 4px 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    .search-btn {
        background: #007bff;
        color: white;
    }
    .clear-btn {
        background: #dc3545;
        color: white;
    }
    /* 搜索记录样式 */
    .search-history {
        margin: 8px 0;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
    }
    .history-tag {
        padding: 2px 8px;
        background: #e9ecef;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
    }
    .history-tag:hover {
        background: #007bff;
        color: white;
    }
    /* 无结果提示 */
    .no-result {
        text-align: center;
        color: #999;
        padding: 20px;
    }
</style>
{% endblock %}

<!-- 页面专属内容 -->
{% block content %}
    <h3>区域管理</h3>
    <div class="my-3">
        <button class="btn btn-sm btn-primary" onclick="add()">新增区域</button>
    </div>

    <!-- 2. 搜索框 + 搜索按钮 + 清空按钮 -->
    <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="输入区域名/备注关键词搜索" onkeydown="if(event.keyCode===13) searchAreas()">
        <button class="search-btn" onclick="searchAreas()">搜索</button>
        <button class="clear-btn" onclick="clearSearch()">× 清空</button>
    </div>
    <!-- 搜索记录展示 -->
    <div class="search-history" id="searchHistory"></div>

    <table class="table table-sm table-bordered">
        <thead>
            <tr><th>ID</th><th>区域名</th><th>备注</th><th>操作</th></tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
{% endblock %}

<!-- 页面专属JS -->
{% block extra_js %}
    <script>
        // 常量定义
        const SEARCH_HISTORY_KEY = 'areaSearchHistory'; // 本地存储key
        const MAX_HISTORY_COUNT = 5; // 最多保存5条搜索记录

        // 1. 加载区域列表（支持关键词过滤）
        function load(keyword = ''){
            console.log('开始加载区域列表...关键词：', keyword);
            // 拼接搜索参数
            let url = '/area-manage/api/area/list/';
            if (keyword) {
                url += `?keyword=${encodeURIComponent(keyword)}`;
            }
            
            $.get(url, function(res){
                console.log('接口返回数据：', res);
                let html='';
                // 处理空结果
                if(Array.isArray(res) && res.length === 0){
                    html = `<tr><td colspan="4" class="no-result">未搜索到相关内容</td></tr>`;
                    $('#list').html(html);
                    return;
                }
                // 处理接口返回错误
                if(res.code === 0){
                    alert(res.msg);
                    return;
                }
                // 遍历数据
                if(Array.isArray(res)){
                    res.forEach(i=>{
                        // 3. 行点击事件（调用edit），按钮阻止冒泡
                        html+=`<tr onclick="edit(${i.id})">
                            <td>${i.id}</td>
                            <td>${i.name}</td>
                            <td>${i.remark || '无'}</td>
                            <td>
                                <button class="btn btn-sm btn-warning me-1" onclick="event.stopPropagation();edit(${i.id})">改</button>
                                <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();del(${i.id})">删</button>
                            </td>
                        </tr>`;
                    });
                }
                $('#list').html(html);
            },'json').fail(function(xhr, status, error){
                console.error('加载失败：', status, error);
                alert(`加载区域列表失败！\n错误：${error}\n返回内容：${xhr.responseText.substring(0, 100)}`);
                $('#list').html(`<tr><td colspan="4" class="no-result">加载失败</td></tr>`);
            });
        }

        // 2. 搜索区域逻辑
        function searchAreas(){
            const keyword = $('#searchInput').val().trim();
            if (!keyword) {
                alert('请输入搜索关键词');
                $('#searchInput').focus();
                return;
            }
            // 保存搜索记录
            saveSearchHistory(keyword);
            // 加载搜索结果
            load(keyword);
            // 刷新搜索记录展示
            loadSearchHistory();
        }

        // 3. 清空搜索（恢复原列表）
        function clearSearch(){
            $('#searchInput').val('');
            load(); // 无关键词加载全部
            // 可选：清空输入框焦点
            $('#searchInput').blur();
        }

        // 4. 保存搜索记录到本地
        function saveSearchHistory(keyword){
            if (!keyword) return;
            // 获取现有记录
            let history = JSON.parse(localStorage.getItem(SEARCH_HISTORY_KEY) || '[]');
            // 去重（已存在则移到最前）
            history = history.filter(item => item !== keyword);
            history.unshift(keyword);
            // 限制数量
            if (history.length > MAX_HISTORY_COUNT) {
                history = history.slice(0, MAX_HISTORY_COUNT);
            }
            // 保存
            localStorage.setItem(SEARCH_HISTORY_KEY, JSON.stringify(history));
        }

        // 5. 加载并展示搜索记录
        function loadSearchHistory(){
            const history = JSON.parse(localStorage.getItem(SEARCH_HISTORY_KEY) || '[]');
            const $historyContainer = $('#searchHistory');
            if (history.length === 0) {
                $historyContainer.html('');
                return;
            }
            let html = '';
            history.forEach(keyword => {
                html += `<span class="history-tag" onclick="useHistory('${keyword}')">${keyword}</span>`;
            });
            $historyContainer.html(html);
        }

        // 6. 点击搜索记录快速填充并搜索
        function useHistory(keyword){
            $('#searchInput').val(keyword);
            searchAreas();
        }

        // 新增区域（原有逻辑）
        function add(){
            let name=prompt('区域名：');
            if(!name)return;
            let remark=prompt('备注：')||'';
            $.ajax({
                url: '/area-manage/api/area/add/',
                type: 'POST',
                data: {name, remark},
                headers: {'X-CSRFToken': getCsrfToken()},
                dataType: 'json',
                success: function(res){
                    alert(res.msg);
                    if(res.code==1)load(); // 新增后刷新列表
                },
                error: function(xhr, status, error){
                    console.error('新增失败：', xhr.responseText);
                    alert('新增区域失败！\n' + xhr.responseText);
                }
            });
        }

        // 编辑区域（原有逻辑）
        function edit(id){
            $.get('/area-manage/api/area/list/',function(areas){
                console.log('所有区域：', areas);
                let a=areas.find(x=>x.id==id);
                if(!a){
                    alert('区域不存在！');
                    return;
                }
                let name=prompt('新名称：',a.name);
                if(!name)return;
                let remark=prompt('备注：',a.remark)||'';
                $.ajax({
                    url: `/area-manage/api/area/edit/${id}/`,
                    type: 'POST',
                    data: {name, remark},
                    headers: {'X-CSRFToken': getCsrfToken()},
                    dataType: 'json',
                    success: function(res){
                        alert(res.msg);
                        if(res.code==1)load(); // 编辑后刷新列表
                    },
                    error: function(xhr, status, error){
                        console.error('编辑失败：', xhr.responseText);
                        alert('编辑区域失败！\n' + xhr.responseText);
                    }
                });
            },'json').fail(function(xhr, status, error){
                console.error('获取区域失败：', xhr.responseText);
                alert('获取区域信息失败！\n' + error);
            });
        }

        // 删除区域（原有逻辑）
        function del(id){
            if(!confirm('确定删除？'))return;
            $.ajax({
                url: `/area-manage/api/area/delete/${id}/`,
                type: 'POST',
                headers: {'X-CSRFToken': getCsrfToken()},
                dataType: 'json',
                success: function(res){
                    alert(res.msg);
                    load(); // 删除后刷新列表
                },
                error: function(xhr, status, error){
                    console.error('删除失败：', xhr.responseText);
                    alert('删除区域失败！\n' + xhr.responseText);
                }
            });
        }

        // 获取CSRF Token（原有逻辑，若全局已存在可删除）
        function getCsrfToken() {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [name, value] = cookie.trim().split('=');
                if (name === 'csrftoken') {
                    return value;
                }
            }
            return '';
        }

        // 页面加载完成后执行
        $(document).ready(function(){
            console.log('页面加载完成，开始执行load()');
            load(); // 加载全部区域
            loadSearchHistory(); // 加载搜索记录
        });
    </script>
{% endblock %}
