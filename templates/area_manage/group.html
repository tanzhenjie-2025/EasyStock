{% extends "base.html" %}

<!-- 页面标题 -->
{% block title %}区域组管理 - EasyStock{% endblock %}

<!-- 页面专属样式 -->
{% block extra_css %}
<style>
    /* 1. 行高亮样式（浅灰色） */
    #list tr {
        transition: background-color 0.2s ease;
        cursor: pointer; /* 提示行可点击 */
    }
    #list tr:hover td {
        background-color: #f1f1f1 !important; /* 浅灰色高亮，覆盖默认样式 */
    }
    /* 操作列光标重置（避免误解） */
    #list tr td:last-child {
        cursor: default;
    }

    /* 搜索框样式 */
    .search-container {
        margin: 10px 0;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .search-input {
        padding: 4px 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        width: 300px;
    }
    .search-btn, .clear-btn {
        padding: 4px 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        color: white;
    }
    .search-btn {
        background: #007bff;
    }
    .clear-btn {
        background: #dc3545;
    }
    /* 搜索记录样式 */
    .search-history {
        margin: 8px 0;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
    }
    .history-tag {
        padding: 2px 8px;
        background: #e9ecef;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
    }
    .history-tag:hover {
        background: #007bff;
        color: white;
    }
    /* 无结果提示 */
    .no-result {
        text-align: center;
        color: #999;
        padding: 20px;
    }
</style>
{% endblock %}

<!-- 页面专属内容 -->
{% block content %}
    <h3>区域组管理（可多选区域组合）</h3>
    <div class="my-3">
        <button class="btn btn-sm btn-primary" onclick="add()">新建组</button>
    </div>

    <!-- 2. 搜索框 + 搜索按钮 + 清空按钮 -->
    <div class="search-container">
        <input type="text" class="search-input" id="searchInput" 
               placeholder="输入组名/备注/包含区域关键词搜索" 
               onkeydown="if(event.keyCode===13) searchGroups()">
        <button class="search-btn" onclick="searchGroups()">搜索</button>
        <button class="clear-btn" onclick="clearSearch()">× 清空</button>
    </div>
    <!-- 搜索记录展示 -->
    <div class="search-history" id="searchHistory"></div>

    <table class="table table-sm table-bordered">
        <thead>
            <tr><th>ID</th><th>组名</th><th>包含区域</th><th>备注</th><th>操作</th></tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
{% endblock %}

<!-- 页面专属JS -->
{% block extra_js %}
    <script>
        let allAreas=[];
        // 常量定义
        const SEARCH_HISTORY_KEY = 'groupSearchHistory'; // 区域组搜索记录本地存储key
        const MAX_HISTORY_COUNT = 5; // 最多保存5条搜索记录

        // 加载区域列表（用于区域组）
        function loadArea(){ 
            console.log('加载区域列表（用于区域组）...');
            $.get('/area-manage/api/area/list/', function(res){
                console.log('区域列表返回：', res);
                if(res.code === 0){
                    alert(res.msg);
                    return;
                }
                allAreas=Array.isArray(res) ? res : [];
            },'json').fail(function(xhr, status, error){
                console.error('加载区域失败：', xhr.responseText);
                alert('加载区域列表失败！\n' + error);
            });
        }

        // 3. 加载区域组列表（支持关键词搜索）
        function loadGroup(keyword = ''){
            console.log('加载区域组列表...关键词：', keyword);
            // 拼接搜索参数
            let url = '/area-manage/api/group/list/';
            if (keyword) {
                url += `?keyword=${encodeURIComponent(keyword)}`;
            }
            
            $.get(url, function(res){
                console.log('区域组接口返回：', res);
                let html='';
                // 处理空结果
                if(Array.isArray(res) && res.length === 0){
                    html = `<tr><td colspan="5" class="no-result">未搜索到相关内容</td></tr>`;
                    $('#list').html(html);
                    return;
                }
                // 处理接口返回错误
                if(res.code === 0){
                    alert(res.msg);
                    return;
                }
                // 遍历数据（行点击调用edit，按钮阻止冒泡）
                if(Array.isArray(res)){
                    res.forEach(g=>{
                        html+=`<tr onclick="edit(${g.id})">
                            <td>${g.id}</td>
                            <td>${g.name}</td>
                            <td>${g.area_names.join('、') || '无'}</td>
                            <td>${g.remark || '无'}</td>
                            <td>
                                <button class="btn btn-sm btn-warning me-1" onclick="event.stopPropagation();edit(${g.id})">改</button>
                                <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();del(${g.id})">删</button>
                            </td>
                        </tr>`;
                    });
                }
                $('#list').html(html);
            },'json').fail(function(xhr, status, error){
                console.error('加载区域组失败：', xhr.responseText);
                alert(`加载区域组列表失败！\n错误：${error}\n返回内容：${xhr.responseText.substring(0, 100)}`);
                $('#list').html(`<tr><td colspan="5" class="no-result">加载失败</td></tr>`);
            });
        }

        // 4. 搜索区域组逻辑
        function searchGroups(){
            const keyword = $('#searchInput').val().trim();
            if (!keyword) {
                alert('请输入搜索关键词');
                $('#searchInput').focus();
                return;
            }
            // 保存搜索记录
            saveSearchHistory(keyword);
            // 加载搜索结果
            loadGroup(keyword);
            // 刷新搜索记录展示
            loadSearchHistory();
        }

        // 5. 清空搜索（恢复原列表）
        function clearSearch(){
            $('#searchInput').val('');
            loadGroup(); // 无关键词加载全部区域组
            $('#searchInput').blur(); // 失去焦点
        }

        // 6. 保存搜索记录到本地
        function saveSearchHistory(keyword){
            if (!keyword) return;
            let history = JSON.parse(localStorage.getItem(SEARCH_HISTORY_KEY) || '[]');
            // 去重（已存在则移到最前）
            history = history.filter(item => item !== keyword);
            history.unshift(keyword);
            // 限制数量
            if (history.length > MAX_HISTORY_COUNT) {
                history = history.slice(0, MAX_HISTORY_COUNT);
            }
            localStorage.setItem(SEARCH_HISTORY_KEY, JSON.stringify(history));
        }

        // 7. 加载并展示搜索记录
        function loadSearchHistory(){
            const history = JSON.parse(localStorage.getItem(SEARCH_HISTORY_KEY) || '[]');
            const $historyContainer = $('#searchHistory');
            if (history.length === 0) {
                $historyContainer.html('');
                return;
            }
            let html = '';
            history.forEach(keyword => {
                html += `<span class="history-tag" onclick="useHistory('${keyword}')">${keyword}</span>`;
            });
            $historyContainer.html(html);
        }

        // 8. 点击搜索记录快速填充并搜索
        function useHistory(keyword){
            $('#searchInput').val(keyword);
            searchGroups();
        }

        // 新增区域组
        function add(){
            let name=prompt('请输入组名：');
            if(!name) return;
            let remark=prompt('请输入备注（可选）：')||'';
            
            if(allAreas.length === 0){
                alert('暂无可用区域，请先添加区域！');
                return;
            }
            let areaSelectStr = '请选择要包含的区域（输入区域ID，多个用英文逗号分隔）：\n';
            allAreas.forEach(a => {
                areaSelectStr += `${a.id} - ${a.name}\n`;
            });
            let selectedIds = prompt(areaSelectStr);
            let areaIds = [];
            if(selectedIds) {
                areaIds = selectedIds.split(',').map(id => id.trim()).filter(id => id);
            }

            $.ajax({
                url: '/area-manage/api/group/add/',
                type: 'POST',
                data: {name, remark, 'area_ids[]': areaIds},
                headers: {'X-CSRFToken': getCsrfToken()},
                dataType: 'json',
                success: function(res){
                    alert(res.msg);
                    if(res.code === 1) loadGroup();
                },
                error: function(xhr, status, error){
                    console.error('新增区域组失败：', xhr.responseText);
                    alert('新增区域组失败！\n' + xhr.responseText);
                }
            });
        }

        // 编辑区域组
        function edit(id){
            $.get('/area-manage/api/group/list/', function(groups){
                console.log('所有区域组：', groups);
                let g=groups.find(x=>x.id == id);
                if(!g){
                    alert('该区域组不存在！');
                    return;
                }
                let name=prompt('请输入新组名：', g.name);
                if(!name) return;
                let remark=prompt('请输入备注（可选）：', g.remark)||'';

                let areaSelectStr = `当前已选：${g.area_names.join('、') || '无'}\n请输入新的区域ID（多个用英文逗号分隔）：\n`;
                allAreas.forEach(a => {
                    areaSelectStr += `${a.id} - ${a.name}\n`;
                });
                let selectedIds = prompt(areaSelectStr, g.area_ids.join(','));
                let areaIds = [];
                if(selectedIds) {
                    areaIds = selectedIds.split(',').map(id => id.trim()).filter(id => id);
                }

                $.ajax({
                    url: `/area-manage/api/group/edit/${id}/`,
                    type: 'POST',
                    data: {name, remark, 'area_ids[]': areaIds},
                    headers: {'X-CSRFToken': getCsrfToken()},
                    dataType: 'json',
                    success: function(res){
                        alert(res.msg);
                        if(res.code === 1) loadGroup();
                    },
                    error: function(xhr, status, error){
                        console.error('编辑区域组失败：', xhr.responseText);
                        alert('编辑区域组失败！\n' + xhr.responseText);
                    }
                });
            },'json').fail(function(xhr, status, error){
                console.error('获取区域组失败：', xhr.responseText);
                alert('获取区域组信息失败！\n' + error);
            });
        }

        // 删除区域组
        function del(id){
            if(!confirm('确定要删除该区域组吗？')) return;
            $.ajax({
                url: `/area-manage/api/group/delete/${id}/`,
                type: 'POST',
                headers: {'X-CSRFToken': getCsrfToken()},
                dataType: 'json',
                success: function(res){
                    alert(res.msg);
                    loadGroup();
                },
                error: function(xhr, status, error){
                    console.error('删除区域组失败：', xhr.responseText);
                    alert('删除区域组失败！\n' + xhr.responseText);
                }
            });
        }

        // 获取CSRF Token（全局通用）
        function getCsrfToken() {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [name, value] = cookie.trim().split('=');
                if (name === 'csrftoken') {
                    return value;
                }
            }
            return '';
        }

        // 页面加载完成后初始化
        $(document).ready(function(){
            console.log('区域组页面加载完成，初始化数据');
            loadArea();
            loadGroup(); // 加载全部区域组
            loadSearchHistory(); // 加载搜索记录
        });
    </script>
{% endblock %}
