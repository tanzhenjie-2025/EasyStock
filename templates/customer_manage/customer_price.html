{% extends "base.html" %}

{% block title %}客户专属价格管理 - EasyStock{% endblock %}

{% block extra_css %}
<style>
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }
    .modal-content {
        background: white;
        padding: 20px;
        border-radius: 8px;
        width: 450px;
        max-width: 90%;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }
    .form-group input, .form-group select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
    }
    .btn-group {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 20px;
    }

    /* 输入法式候选框样式 */
    .suggest-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        min-width: 350px;
        max-width: 500px;
        width: auto !important;
        background: #fff;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        z-index: 9999;
        font-size: 14px;
        text-align: left;
        white-space: nowrap;
        overflow: hidden;
    }
    .suggest-dropdown div {
        padding: 6px 12px;
        cursor: pointer;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
    }
    .suggest-dropdown div:hover,
    .suggest-dropdown div.active {
        background: #0066cc;
        color: #fff;
    }

    /* 输入框容器（用于定位候选框） */
    .input-container {
        position: relative;
        width: 100%;
    }
</style>
{% endblock %}

{% block content %}
<div class="content-container">
    <h3>客户专属价格管理</h3>
    <div class="my-3">
        <button class="btn btn-sm btn-primary" onclick="openAddModal()">新增专属价</button>
    </div>
    <table class="table table-sm table-bordered">
        <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>客户名称</th>
                <th>商品名称</th>
                <th>商品标准价</th>
                <th>客户专属价</th>
                <th>备注</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="priceList">
            <!-- 动态填充 -->
        </tbody>
    </table>
</div>

<!-- 新增/编辑专属价弹窗 -->
<div class="modal-overlay" id="priceModal">
    <div class="modal-content">
        <h4 id="modalTitle">新增客户专属价</h4>
        <form id="priceForm">
            <input type="hidden" id="priceId" value="">
            
            <!-- 替换客户下拉框为输入法式输入框 -->
            <div class="form-group">
                <label for="customerInput">客户名称 <span style="color:red">*</span></label>
                <div class="input-container">
                    <input 
                        type="text" 
                        id="customerInput" 
                        placeholder="输入区域/客户名（按1-8选择，空格选第一个）" 
                        required
                    >
                </div>
                <input type="hidden" id="customerId" value="">
            </div>
            
            <!-- 替换商品下拉框为输入法式输入框 -->
            <div class="form-group">
                <label for="productInput">商品名称 <span style="color:red">*</span></label>
                <div class="input-container">
                    <input 
                        type="text" 
                        id="productInput" 
                        placeholder="输入商品名/拼音（按1-8选择，空格选第一个）" 
                        required
                    >
                </div>
                <input type="hidden" id="productId" value="">
                <input type="hidden" id="productStandardPrice" value="">
                <div style="margin-top: 5px; color: #666; font-size: 12px;">
                    商品标准价：<span id="productPriceText">¥0.00</span>
                </div>
            </div>
            
            <div class="form-group">
                <label for="customPrice">客户专属价（¥）<span style="color:red">*</span></label>
                <input type="number" id="customPrice" step="0.01" min="0" placeholder="请输入专属价格" required>
            </div>
            <div class="form-group">
                <label for="priceRemark">备注</label>
                <input type="text" id="priceRemark" placeholder="如：熟客优惠价、长期合作价">
            </div>
            <div class="btn-group">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button type="button" class="btn btn-primary" onclick="savePrice()">保存</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentPriceId = '';
    let customerList = [];
    let productList = [];

    // ========== 输入法式选择核心变量 ==========
    let currentSearchInput = null;    // 当前激活的搜索输入框
    let currentSuggestList = [];      // 当前候选列表
    let suggestBox = null;            // 全局候选框DOM

    // ========== 页面初始化 ==========
    $(document).ready(function() {
        initSuggestBox(); // 初始化候选框
        loadPriceList();  // 加载专属价列表
        initCustomerInput(); // 初始化客户输入框
        initProductInput();  // 初始化商品输入框
        initPriceInput();    // ✅ 修复：新增调用价格输入框初始化
        initRemarkInput();   // ✅ 新增：初始化备注输入框回车事件
        window.addEventListener('click', hideAllSuggest); // 点击空白处关闭候选框
    });
    
    // ========== 新增：价格输入框回车提交逻辑 ==========
    function initPriceInput() {
        const priceInput = document.getElementById('customPrice');
        if (priceInput) {
            priceInput.addEventListener('keydown', function(e) {
                // 回车跳转到备注框
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('priceRemark').focus();
                }
            });
        }
    }

    // ========== 新增：备注输入框回车提交逻辑 ==========
    function initRemarkInput() {
        const remarkInput = document.getElementById('priceRemark');
        if (remarkInput) {
            remarkInput.addEventListener('keydown', function(e) {
                // 回车触发保存
                if (e.key === 'Enter') {
                    e.preventDefault();
                    savePrice(); // 调用保存函数
                }
            });
        }
    }

    // ========== 1. 候选框初始化 ==========
    function initSuggestBox() {
        suggestBox = document.createElement('div');
        suggestBox.className = 'suggest-dropdown';
        document.body.appendChild(suggestBox);
    }

    function hideSuggest() {
        if (suggestBox) suggestBox.style.display = 'none';
        currentSearchInput = null;
        currentSuggestList = [];
    }

    function hideAllSuggest(e) {
        if (e && e.target.closest('.suggest-dropdown')) return;
        if (e && e.target.id === 'customerInput') return;
        if (e && e.target.id === 'productInput') return;
        hideSuggest();
    }

    // ========== 2. 客户输入框逻辑（输入法式选择） ==========
    function initCustomerInput() {
        const customerInput = document.getElementById('customerInput');
        if (customerInput) {
            customerInput.addEventListener('input', () => onCustomerInput(customerInput));
            customerInput.addEventListener('keydown', handleCustomerInputKey);
            customerInput.addEventListener('blur', () => {
                setTimeout(hideSuggest, 200);
            });
        }
    }

    async function onCustomerInput(input) {
        const keyword = input.value.trim();
        if (!keyword) {
            hideSuggest();
            return;
        }
        currentSearchInput = input;
        try {
            const res = await fetch(`/customer-manage/customer/search/?keyword=${encodeURIComponent(keyword)}`);
            const data = await res.json();
            if (data.code === 1 && data.data.length > 0) {
                currentSuggestList = data.data;
                showSuggest(input, data.data, 'customer');
            } else {
                hideSuggest();
            }
        } catch (e) { 
            hideSuggest(); 
            console.error('搜索客户失败：', e);
        }
    }

    function handleCustomerInputKey(e) {
        // ✅ 修复：先处理回车跳转（不受候选列表限制）
        if (e.key === 'Enter') {
            e.preventDefault();
            // 如果已选择客户，直接跳转；未选择则提示并仍跳转（提升体验）
            if (!$('#customerId').val()) {
                alert('请先选择客户（空格选第一个/数字选对应项）！');
            }
            document.getElementById('productInput').focus();
            return; // 阻止后续逻辑
        }

        // ESC关闭候选框（不受候选列表限制）
        if (e.key === 'Escape') {
            e.preventDefault();
            hideSuggest();
            return;
        }

        // 只有有候选列表时，才处理空格/数字选择
        if (!currentSuggestList.length) return;
        
        // 空格选择第一个
        if (e.key === ' ') {
            e.preventDefault();
            selectCustomerItem(0);
        }
        // 数字1-8选择对应候选
        const num = parseInt(e.key);
        if (!isNaN(num) && num >= 1 && num <= currentSuggestList.length) {
            e.preventDefault();
            selectCustomerItem(num - 1);
        }
    }

    function selectCustomerItem(index) {
        const item = currentSuggestList[index];
        if (!item || !currentSearchInput) return;
        
        // 填充输入框和隐藏字段
        document.getElementById('customerInput').value = item.full_name;
        document.getElementById('customerId').value = item.id;
        
        hideSuggest();
    }

    // ========== 3. 商品输入框逻辑（输入法式选择） ==========
    function initProductInput() {
        const productInput = document.getElementById('productInput');
        if (productInput) {
            productInput.addEventListener('input', () => onProductInput(productInput));
            productInput.addEventListener('keydown', handleProductInputKey);
            productInput.addEventListener('blur', () => {
                setTimeout(hideSuggest, 200);
            });
        }
    }

    async function onProductInput(input) {
        const keyword = input.value.trim();
        if (!keyword) {
            hideSuggest();
            return;
        }
        currentSearchInput = input;
        try {
            const res = await fetch(`/customer-manage/product/search/?keyword=${encodeURIComponent(keyword)}`);
            const data = await res.json();
            if (data.code === 1 && data.data.length > 0) {
                currentSuggestList = data.data;
                showSuggest(input, data.data, 'product');
            } else {
                hideSuggest();
            }
        } catch (e) { 
            hideSuggest(); 
            console.error('搜索商品失败：', e);
        }
    }

    function handleProductInputKey(e) {
        // ✅ 修复：先处理回车跳转（不受候选列表限制）
        if (e.key === 'Enter') {
            e.preventDefault();
            // 如果已选择商品，直接跳转；未选择则提示并仍跳转
            if (!$('#productId').val()) {
                alert('请先选择商品（空格选第一个/数字选对应项）！');
            }
            document.getElementById('customPrice').focus();
            return; // 阻止后续逻辑
        }

        // ESC关闭候选框（不受候选列表限制）
        if (e.key === 'Escape') {
            e.preventDefault();
            hideSuggest();
            return;
        }

        // 只有有候选列表时，才处理空格/数字选择
        if (!currentSuggestList.length) return;
        
        // 空格选择第一个
        if (e.key === ' ') {
            e.preventDefault();
            selectProductItem(0);
        }
        // 数字1-8选择对应候选
        const num = parseInt(e.key);
        if (!isNaN(num) && num >= 1 && num <= currentSuggestList.length) {
            e.preventDefault();
            selectProductItem(num - 1);
        }
    }

    function selectProductItem(index) {
        const item = currentSuggestList[index];
        if (!item || !currentSearchInput) return;
        
        // 填充输入框和隐藏字段
        document.getElementById('productInput').value = item.name;
        document.getElementById('productId').value = item.id;
        document.getElementById('productStandardPrice').value = item.price;
        document.getElementById('productPriceText').textContent = `¥${parseFloat(item.price).toFixed(2)}`;
        
        hideSuggest();
    }

    // ========== 4. 候选框展示 ==========
    function showSuggest(input, list, type) {
        const rect = input.getBoundingClientRect();
        suggestBox.style.left = rect.left + 'px';
        suggestBox.style.top = (rect.bottom + window.scrollY) + 'px';
        suggestBox.innerHTML = '';

        // 根据类型渲染不同的候选内容
        list.slice(0, 8).forEach((item, idx) => {
            const div = document.createElement('div');
            if (type === 'customer') {
                div.textContent = `${idx+1} ${item.full_name}`;
            } else if (type === 'product') {
                div.textContent = `${idx+1} ${item.name}  ¥${parseFloat(item.price).toFixed(2)}/${item.unit}`;
            }
            div.dataset.index = idx;
            div.onclick = () => {
                type === 'customer' ? selectCustomerItem(idx) : selectProductItem(idx);
            };
            suggestBox.appendChild(div);
        });
        suggestBox.style.display = 'block';
    }

    // ========== 5. 原有逻辑改造（适配新输入框） ==========
    // 加载专属价列表（原有逻辑不变）
    function loadPriceList() {
        $.get('/customer-manage/price/list/', function(res) {
            let html = '';
            if (Array.isArray(res) && res.length > 0) {
                res.forEach(item => {
                    html += `<tr>
                        <td>${item.id}</td>
                        <td>${item.customer_name}</td>
                        <td>${item.product_name}</td>
                        <td>¥${item.standard_price.toFixed(2)}</td>
                        <td>¥${item.custom_price.toFixed(2)}</td>
                        <td>${item.remark || '无'}</td>
                        <td>
                            <button class="btn btn-sm btn-warning me-1" onclick="openEditModal(${item.id})">编辑</button>
                            <button class="btn btn-sm btn-danger" onclick="deletePrice(${item.id})">删除</button>
                        </td>
                    </tr>`;
                });
            } else {
                html = '<tr><td colspan="7" class="text-center">暂无客户专属价数据</td></tr>';
            }
            $('#priceList').html(html);
        }, 'json').fail(function(err) {
            alert('加载专属价列表失败！');
            console.error(err);
        });
    }

    // 打开新增弹窗（重置输入框）
    function openAddModal() {
        $('#modalTitle').text('新增客户专属价');
        $('#priceForm')[0].reset();
        $('#priceId').val('');
        $('#customerId').val('');
        $('#productId').val('');
        $('#productStandardPrice').val('');
        $('#productPriceText').text('¥0.00');
        currentPriceId = '';
        $('#priceModal').css('display', 'flex');
        // 聚焦到客户输入框
        setTimeout(() => {
            document.getElementById('customerInput').focus();
        }, 100);
    }

    // 打开编辑弹窗（适配新输入框）
    function openEditModal(id) {
        currentPriceId = id;
        $.get('/customer-manage/price/list/', function(res) {
            const item = res.find(p => p.id === id);
            if (!item) {
                alert('专属价记录不存在！');
                return;
            }
            // 填充表单
            $('#modalTitle').text('编辑客户专属价');
            $('#priceId').val(item.id);
            
            // 填充客户信息
            $('#customerId').val(item.customer_id);
            // 异步获取客户全称
            $.get(`/customer-manage/customer/list/`, function(customers) {
                const customer = customers.find(c => c.id === item.customer_id);
                if (customer) {
                    $('#customerInput').val(`${customer.area_name} | ${customer.name}`);
                }
            }, 'json');
            
            // 填充商品信息
            $('#productId').val(item.product_id);
            $('#productStandardPrice').val(item.standard_price);
            $('#productPriceText').text(`¥${item.standard_price.toFixed(2)}`);
            // 异步获取商品名称
            $.get(`/customer-manage/product/list/`, function(products) {
                const product = products.find(p => p.id === item.product_id);
                if (product) {
                    $('#productInput').val(product.name);
                }
            }, 'json');
            
            $('#customPrice').val(item.custom_price);
            $('#priceRemark').val(item.remark || '');
            $('#priceModal').css('display', 'flex');
        }, 'json').fail(function(err) {
            alert('获取专属价信息失败！');
            console.error(err);
        });
    }

    // 关闭弹窗（重置状态）
    function closeModal() {
        $('#priceModal').css('display', 'none');
        $('#priceForm')[0].reset();
        $('#customerId').val('');
        $('#productId').val('');
        $('#productStandardPrice').val('');
        $('#productPriceText').text('¥0.00');
        currentPriceId = '';
        hideSuggest();
    }

    // 保存专属价（适配新输入框）
    function savePrice() {
        const customerId = $('#customerId').val().trim();
        const productId = $('#productId').val().trim();
        const customPrice = $('#customPrice').val().trim();
        const remark = $('#priceRemark').val().trim();

        // 校验
        if (!customerId) { alert('请选择客户！'); return; }
        if (!productId && !currentPriceId) { alert('请选择商品！'); return; } // 编辑时不校验商品/客户
        if (!customPrice || isNaN(customPrice) || parseFloat(customPrice) < 0) {
            alert('请输入有效的专属价格！');
            return;
        }

        // ========== 核心修复：将 const 改为 let，允许重新赋值 ==========
        let data = {
            customer_id: customerId,
            product_id: productId,
            custom_price: customPrice,
            remark: remark
        };

        // 请求URL
        let url = '/customer-manage/price/add/';
        if (currentPriceId) {
            url = `/customer-manage/price/edit/${currentPriceId}/`;
            // 编辑时只传价格和备注（客户/商品不可改）
            data = { custom_price: customPrice, remark: remark };
        }

        // 发送请求
        $.ajax({
            url: url,
            type: 'POST',
            data: data,
            headers: {'X-CSRFToken': getCsrfToken()},
            dataType: 'json',
            success: function(res) {
                alert(res.msg);
                if (res.code === 1) {
                    closeModal();
                    loadPriceList();
                }
            },
            error: function(err) {
                alert('保存失败！');
                console.error(err);
            }
        });
    }

    // 删除专属价（原有逻辑不变）
    function deletePrice(id) {
        if (!confirm('确定删除该专属价吗？')) return;
        $.ajax({
            url: `/customer-manage/price/delete/${id}/`,
            type: 'POST',
            headers: {'X-CSRFToken': getCsrfToken()},
            dataType: 'json',
            success: function(res) {
                alert(res.msg);
                if (res.code === 1) loadPriceList();
            },
            error: function(err) {
                alert('删除失败！');
                console.error(err);
            }
        });
    }

    // CSRF Token获取函数
    function getCsrfToken() {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, 10) === 'csrftoken=') {
                    cookieValue = decodeURIComponent(cookie.substring(10));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
{% endblock %}
