{% extends 'base.html' %}
{% block title %}客户统计详情{% endblock %}
{% block extra_css %}
<style>
    .stat-card { border-radius: 8px; padding: 20px; text-align: center; margin-bottom: 20px; }
    .card-consume { background: #e3f2fd; }
    .card-debt { background: #fff3cd; }
    .card-order { background: #d1e7dd; }
    .disabled-btn { pointer-events: none; opacity: 0.6; }
    .table th, .table td { vertical-align: middle; text-align: center; }

    /* 骨架屏样式 */
    .skeleton {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s infinite;
    }
    @keyframes skeleton-loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }
    .skeleton-card { height: 100px; border-radius: 8px; }
    .skeleton-row { height: 40px; margin: 10px 0; border-radius: 4px; }
</style>
{% endblock %}

{% block content %}
<meta name="csrf-token" content="{{ csrf_token }}">
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5>客户统计详情</h5>
        <a href="{% url 'customer_manage:customer_page' %}" class="btn btn-sm btn-outline-secondary">返回客户列表</a>
    </div>
    <div class="card-body">
        <!-- 筛选区域 -->
        <div class="row mb-4 g-3">
            <div class="col-md-2">
                <select id="time_range" class="form-select">
                    <option value="30days" selected>最近30天</option>
                    <option value="today">今日</option>
                    <option value="month">本月</option>
                    <option value="year">本年</option>
                    <option value="custom">自定义时间</option>
                </select>
            </div>
            <div class="col-md-2 d-none" id="date_range">
                <input type="date" id="start_date" class="form-control">
            </div>
            <div class="col-md-2 d-none" id="date_range_end">
                <input type="date" id="end_date" class="form-control">
            </div>
            <div class="col-md-2">
                <select id="area_id" class="form-select">
                    <option value="">全部区域</option>
                    {% for area in areas %}
                    <option value="{{ area.id }}">{{ area.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2">
                <select id="status" class="form-select">
                    <option value="all">全部客户</option>
                    <option value="active">启用客户</option>
                    <option value="disabled">禁用客户</option>
                </select>
            </div>
            <div class="col-md-2">
                <button id="calcBtn" class="btn btn-primary w-100" onclick="calculateStats()">
                    🔄 重新统计
                </button>
            </div>
        </div>

        <!-- 全局统计卡片 -->
        <div class="row" id="statsCardsWrapper">
            <div id="cardsSkeleton">
                <div class="col-md-4"><div class="skeleton skeleton-card"></div></div>
                <div class="col-md-4"><div class="skeleton skeleton-card"></div></div>
                <div class="col-md-4"><div class="skeleton skeleton-card"></div></div>
            </div>
            <div class="row" id="globalStats" style="display: none;">
                <div class="col-md-4">
                    <div class="stat-card card-consume">
                        <h6>总消费金额</h6>
                        <h4 class="text-primary" id="total_consume">0</h4>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card card-debt">
                        <h6>总欠款金额</h6>
                        <h4 class="text-warning" id="total_debt">0</h4>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card card-order">
                        <h6>总订单数量</h6>
                        <h4 class="text-success" id="total_order">0</h4>
                    </div>
                </div>
            </div>
        </div>

        <!-- 统计列表 -->
        <div class="table-responsive mt-4" id="tableWrapper">
            <div id="tableSkeleton">
                <div class="skeleton skeleton-row"></div>
                <div class="skeleton skeleton-row"></div>
                <div class="skeleton skeleton-row"></div>
                <div class="skeleton skeleton-row"></div>
                <div class="skeleton skeleton-row"></div>
            </div>
            <div id="tableContent" style="display: none;">
                <table class="table table-bordered table-hover">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>客户名称</th>
                            <th>区域</th>
                            <th>电话</th>
                            <th>状态</th>
                            <th>总消费</th>
                            <th>总欠款</th>
                            <th>总订单</th>
                            <th>已完成</th>
                            <th>未结清</th>
                            <th>最近消费</th>
                        </tr>
                    </thead>
                    <tbody id="statsTable"></tbody>
                </table>
            </div>
        </div>

        <!-- 分页 -->
        <div id="pagination" class="text-center mt-3"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let statsCache = null;
let currentPage = 1;

// 页面加载
$(document).ready(function(){
    console.log("页面加载完成，开始请求统计数据...");
    calculateStats();
});

// 时间选择器
$('#time_range').change(function(){
    if($(this).val() === 'custom'){
        $('#date_range, #date_range_end').removeClass('d-none');
    }else{
        $('#date_range, #date_range_end').addClass('d-none');
    }
});

// 🔥 核心：统计函数（修复版）
function calculateStats(page=1) {
    currentPage = page;
    console.log("开始统计，当前页：", page);

    // 1. 显示骨架屏
    showSkeleton(true);

    // 2. 防重复点击
    const btn = $('#calcBtn');
    const originalText = btn.html();
    btn.addClass('disabled-btn').html('⏳ 统计中...').prop('disabled', true);

    // 3. 读取参数
    const params = {
        time_range: $('#time_range').val(),
        start_date: $('#start_date').val(),
        end_date: $('#end_date').val(),
        area_id: $('#area_id').val(),
        status: $('#status').val(),
        page: page
    };
    console.log("请求参数：", params);

    // 4. 缓存检查
    if(statsCache && JSON.stringify(statsCache.params) === JSON.stringify(params)){
        console.log("命中缓存，直接渲染");
        renderStats(statsCache.data);
        showSkeleton(false); // 🔥 修复：缓存命中也要关骨架屏
        btn.removeClass('disabled-btn').html(originalText).prop('disabled', false);
        return;
    }

    // 5. 请求接口
    $.getJSON("{% url 'customer_manage:calculate_customer_stats' %}", params, function(res){
        console.log("接口返回数据：", res); // 🔥 调试日志
        
        if(res.code !== 1){
            alert(res.msg || '统计失败');
            showSkeleton(false);
            btn.removeClass('disabled-btn').html(originalText).prop('disabled', false);
            return;
        }
        
        // 缓存结果
        statsCache = { params: params, data: res };
        renderStats(res);
        
    }).fail(function(xhr, status, error){
        console.error("请求失败：", error);
        alert('加载统计数据失败，请重试');
        showSkeleton(false);
    }).always(function(){
        // 🔥 修复：无论成功失败，最后都恢复按钮
        btn.removeClass('disabled-btn').html(originalText).prop('disabled', false);
    });
}

// 骨架屏控制
function showSkeleton(show) {
    console.log("骨架屏状态：", show ? "显示" : "隐藏");
    if (show) {
        $('#cardsSkeleton').show();
        $('#globalStats').hide();
        $('#tableSkeleton').show();
        $('#tableContent').hide();
    } else {
        $('#cardsSkeleton').hide();
        $('#globalStats').show();
        $('#tableSkeleton').hide();
        $('#tableContent').show();
    }
}

// 🔥 渲染统计数据（增强版：带安全检查）
function renderStats(res) {
    console.log("开始渲染数据...");
    
    // 安全检查
    if (!res || !res.global_stats) {
        console.error("数据格式错误：", res);
        return;
    }

    // 1. 关闭骨架屏（双重保险）
    showSkeleton(false);

    // 2. 渲染全局卡片
    try {
        const tc = res.global_stats.total_consume || 0;
        const td = res.global_stats.total_debt || 0;
        const to = res.global_stats.total_order || 0;
        
        $('#total_consume').text(parseFloat(tc).toFixed(2) + ' 元');
        $('#total_debt').text(parseFloat(td).toFixed(2) + ' 元');
        $('#total_order').text(to + ' 单');
    } catch (e) {
        console.error("渲染卡片失败：", e);
    }

    // 3. 渲染列表
    const tbody = $('#statsTable'); 
    tbody.empty();
    
    const customers = res.customers || [];
    if (customers.length === 0) {
        tbody.append('<tr><td colspan="11" class="text-center text-muted py-4">暂无数据</td></tr>');
    } else {
        customers.forEach((item, index) => {
            const status = item.is_active 
                ? '<span class="text-success">启用</span>' 
                : '<span class="text-danger">禁用</span>';
            
            // 安全取值
            const consume = item.total_consume ? parseFloat(item.total_consume).toFixed(2) : '0.00';
            const debt = item.total_debt ? parseFloat(item.total_debt).toFixed(2) : '0.00';
            
            tbody.append(`
                <tr>
                    <td>${(currentPage-1)*20 + index+1}</td>
                    <td>${item.name || '-'}</td>
                    <td>${item.area_name || '无'}</td>
                    <td>${item.phone || '-'}</td>
                    <td>${status}</td>
                    <td>${consume}</td>
                    <td class="text-warning">${debt}</td>
                    <td>${item.total_order || 0}</td>
                    <td>${item.finished_order || 0}</td>
                    <td>${item.unsettled_order || 0}</td>
                    <td>${item.last_consume_time || '无'}</td>
                </tr>
            `);
        });
    }

    // 4. 渲染分页
    renderPagination(res.total_count || 0, 20, res.total_pages || 1);
    console.log("渲染完成");
}

// 分页
function renderPagination(total, pageSize, totalPages) {
    const html = [];
    for(let i=1; i<=totalPages; i++){
        html.push(`<button class="btn btn-sm ${i==currentPage ? 'btn-primary' : 'btn-outline-primary'}" onclick="calculateStats(${i})">${i}</button>`);
    }
    $('#pagination').html(html.join(' '));
}

function getCsrfToken() { return $('meta[name="csrf-token"]').attr('content'); }
</script>
{% endblock %}
