{% extends 'base.html' %}
{% block title %}强制修改密码 - EasyStock系统{% endblock %}
{% block extra_css %}
<style>
    .password-card { max-width: 500px; margin: 0 auto; margin-top: 50px; }
    .form-label-sm { font-weight: 500; }
</style>
{% endblock %}
{% block content %}
<div class="card password-card">
    <div class="card-header bg-warning text-white">
        <h5 class="mb-0 text-center">⚠️ 强制修改密码</h5>
    </div>
    <div class="card-body">
        <div class="alert alert-warning mb-4">
            您的密码已被管理员重置为临时密码，请立即修改为个人专属密码！
        </div>
        <form method="post" class="needs-validation" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label form-label-sm" for="old_password">当前密码（临时密码）<span class="text-danger">*</span></label>
                <input type="password" class="form-control form-control-sm" id="old_password" name="old_password" required>
                <div class="invalid-feedback">请输入当前临时密码</div>
            </div>
            <div class="mb-3">
                <label class="form-label form-label-sm" for="new_password">新密码 <span class="text-danger">*</span></label>
                <input type="password" class="form-control form-control-sm" id="new_password" name="new_password" required>
                <div class="invalid-feedback">请输入新密码（至少8位）</div>
                <div class="form-text mt-1">密码长度至少8位，建议包含字母和数字</div>
            </div>
            <div class="mb-3">
                <label class="form-label form-label-sm" for="confirm_password">确认新密码 <span class="text-danger">*</span></label>
                <input type="password" class="form-control form-control-sm" id="confirm_password" name="confirm_password" required>
                <div class="invalid-feedback">请确认新密码</div>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">确认修改</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// 表单验证
(function () {
    'use strict'
    const forms = document.querySelectorAll('.needs-validation')
    Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
            if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
            }
            form.classList.add('was-validated')
        }, false)
    })
})()
</script>
{% endblock %}
