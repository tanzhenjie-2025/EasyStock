{% extends "base.html" %}

{% block title %}个人信息 - EasyStock{% endblock %}

{% block extra_css %}
<style>
    .profile-card {
        max-width: 600px;
        margin: 20px auto;
        padding: 20px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        border-radius: 5px;
    }
</style>
{% endblock %}

{% block content %}
<div class="profile-card">
    <h3 class="mb-4">个人信息修改</h3>
    <form method="post">
        {% csrf_token %}
        <div class="row mb-3">
    <div class="col-md-6">
        <label for="user_code">用户编号（不可修改）</label>
        <input type="text" id="user_code" value="{{ user.user_code }}" disabled>
    </div>
    <div class="col-md-6">
        <label for="username">用户名（可修改）</label>
        <input type="text" id="username" name="username" value="{{ user.username }}" required>
    </div>
</div>
<div class="row mb-3">
    <div class="col-md-6">
        <label for="phone">联系电话</label>
        <input type="text" id="phone" name="phone" value="{{ user.phone|default:'' }}">
    </div>
    <div class="col-md-6">
        <label for="email">邮箱</label>
        <input type="email" id="email" name="email" value="{{ user.email|default:'' }}">
    </div>
</div>
<div class="mb-3">
    <label for="address">地址</label>
    <textarea id="address" name="address" rows="3">{{ user.address|default:'' }}</textarea>
</div>
<hr>
<div class="mb-3">
    <label for="old_password">原密码（修改密码时必须填写）</label>
    <input type="password" id="old_password" name="old_password" placeholder="请输入当前密码">
</div>
<div class="mb-3">
    <label for="new_password">新密码（不填则不修改）</label>
    <input type="password" id="new_password" name="new_password" placeholder="请输入新密码">
</div>
        <button type="submit" class="btn btn-primary">保存修改</button>
    </form>
</div>
{% endblock %}
